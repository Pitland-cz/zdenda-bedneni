document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

mé hlavy<\u002Fspan><\u002Fli>\n          <li style=\"display:flex;gap:11px;font-size:16px;line-height:1.45\"><span style=\"color:#0E4FB3;font-weight:800\">✓<\u002Fspan> <span>Dřevěné nosníky <strong>H20 / GT24<\u002Fstrong> — primární i sekundární rošt<\u002Fspan><\u002Fli>\n          <li style=\"display:flex;gap:11px;font-size:16px;line-height:1.45\"><span style=\"color:#0E4FB3;font-weight:800\">✓<\u002Fspan> <span><strong>Bednicí a T-PLEX desky<\u002Fstrong> jako spodní líc stropní desky<\u002Fspan><\u002Fli>\n          <li style=\"display:flex;gap:11px;font-size:16px;line-height:1.45\"><span style=\"color:#0E4FB3;font-weight:800\">✓<\u002Fspan> <span>Půjčíme i <strong>malé množství<\u002Fstrong> · pásmové slevy · zaškolení a <a href=\"#cenik\" style=\"color:#0E4FB3;font-weight:700;text-decoration:underline\">kladecí plán zdarma<\u002Fa><\u002Fspan><\u002Fli>\n        <\u002Ful>\n        <a href=\"#kontakty\" style=\"display:inline-block;background:#0E4FB3;color:#fff;font-weight:800;font-size:16px;padding:14px 26px;border-radius:999px;box-shadow:0 4px 0 #0a3a86\">Chci půjčit bednění<\u002Fa>\n      <\u002Fdiv>\n      <div style=\"position:relative;aspect-ratio:4/3;border-radius:10px;overflow:hidden;background:url(foto-8.jpg) center/cover;display:flex;align-items:flex-end;padding:18px\">\n        \n        \n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- REALIZACE -->\n  <section id=\"realizace\" style=\"background:#fff;padding:74px 24px\">\n    <div class=\"twocol\" style=\"max-width:1180px;margin:0 auto;display:grid;grid-template-columns:1fr 1.05fr;gap:54px;align-items:center\">\n      <div style=\"position:relative;aspect-ratio:4/3;border-radius:10px;overflow:hidden;background:url(foto-6.jpg) center/cover;display:flex;align-items:flex-end;padding:18px;order:0\">\n        \n        \n      <\u002Fdiv>\n      <div>\n        <span style=\"font-family:'Barlow Condensed',sans-serif;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#0E4FB3;font-size:15px\">Na klíč<\u002Fspan>\n        <h2 style=\"font-family:'Barlow Condensed',sans-serif;font-weight:800;text-transform:uppercase;font-size:clamp(30px,4vw,48px);line-height:.98;margin:6px 0 18px\">Monolitické stropy kompletně<\u002Fh2>\n        <p style=\"font-size:17px;line-height:1.6;color:#2b313a;max-width:540px\">Nechcete řešit nic? Postavíme <strong>celý železobetonový strop<\u002Fstrong> — bednění, uložení <strong>výztuže<\u002Fstrong> i <strong>betonáž<\u002Fstrong>. Vy dostanete hotovou rovnou desku a my si odvezeme bednění zpět.<\u002Fp>\n        <ul style=\"list-style:none;padding:0;margin:22px 0;display:grid;gap:10px\">\n          <li style=\"display:flex;gap:11px;font-size:16px\"><span style=\"color:#0E4FB3;font-weight:800\">✓<\u002Fspan> <span>Zaměření, statika ve spolupráci, <strong>kladecí plán<\u002Fstrong><\u002Fspan><\u002Fli>\n          <li style=\"display:flex;gap:11px;font-size:16px\"><span style=\"color:#0E4FB3;font-weight:800\">✓<\u002Fspan> <span>Montáž bednění, armování, betonáž i odbednění<\u002Fspan><\u002Fli>\n          <li style=\"display:flex;gap:11px;font-size:16px\"><span style=\"color:#0E4FB3;font-weight:800\">✓<\u002Fspan> <span>Pro <strong>stavební firmy<\u002Fstrong>, stavbu <strong>RD svépomocí<\u002Fstrong> i developery<\u002Fspan><\u002Fli>\n        <\u002Ful>\n        <div style=\"display:inline-flex;align-items:baseline;gap:10px;background:#eaf1fc;border:1px solid #cfe0f8;border-radius:10px;padding:14px 20px;margin-bottom:22px\">\n          <span style=\"font-weight:600;color:#3a4452;font-size:14px\">Orientačně<\u002Fspan>\n          <span style=\"font-family:'Barlow Condensed',sans-serif;font-weight:800;color:#0E4FB3;font-size:30px;line-height:1\">2 000–3 500 Kč/m²<\u002Fspan>\n        <\u002Fdiv>\n        <div><a href=\"#kontakty\" style=\"display:inline-block;background:#0E4FB3;color:#fff;font-weight:800;font-size:16px;padding:14px 26px;border-radius:999px;box-shadow:0 4px 0 #0a3a86\">Poptat strop na klíč<\u002Fa><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- CENIK + KALKULACKA -->\n  <section id=\"cenik\" style=\"background:#14171c;color:#fff;padding:78px 24px\">\n    <div style=\"max-width:1180px;margin:0 auto\">\n      <div style=\"text-align:center;margin-bottom:40px\">\n        <span style=\"font-family:'Barlow Condensed',sans-serif;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#F47A1F;font-size:15px\">Ceník<\u002Fspan>\n        <h2 style=\"font-family:'Barlow Condensed',sans-serif;font-weight:800;text-transform:uppercase;font-size:clamp(32px,4.4vw,52px);line-height:.98;margin:6px 0 0\">Spočítejte si cenu hned<\u002Fh2>\n        <p style=\"color:#aab3c0;font-size:16px;margin:12px 0 0\">Orientační kalkulace pronájmu kompletní sestavy bednění. Ceny <strong style=\"color:#fff\">bez DPH<\u002Fstrong>, plátce DPH 21 %.<\u002Fp>\n      <\u002Fdiv>\n\n      <!-- CALCULATOR -->\n      <div style=\"background:#fff;color:#14171c;border-radius:16px;overflow:hidden;box-shadow:0 20px 50px rgba(0,0,0,.35)\">\n        <div class=\"calc-grid\" style=\"display:grid;grid-template-columns:1.1fr 1fr\">\n          <!-- inputs -->\n          <div style=\"padding:34px 34px 30px;border-right:1px solid #e6eaf0\">\n            <h3 style=\"font-family:'Barlow Condensed',sans-serif;font-weight:800;text-transform:uppercase;font-size:22px;margin:0 0 22px\">Živá kalkulačka<\u002Fh3>\n\n            <div style=\"margin-bottom:24px\">\n              <div style=\"display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px\"><label style=\"font-weight:700;font-size:15px\">Plocha stropu<\u002Flabel><span style=\"font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:22px;color:#0E4FB3\">{{ area }} m²<\u002Fspan><\u002Fdiv>\n              <input type=\"range\" min=\"10\" max=\"600\" step=\"5\" value=\"{{ area }}\" oninput=\"{{ onArea }}\" style=\"width:100%;accent-color:#0E4FB3\">\n            <\u002Fdiv>\n\n            <div style=\"margin-bottom:24px\">\n              <div style=\"display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px\"><label style=\"font-weight:700;font-size:15px\">Doba pronájmu<\u002Flabel><span style=\"font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:22px;color:#0E4FB3\">{{ days }} dní<\u002Fspan><\u002Fdiv>\n              <input type=\"range\" min=\"1\" max=\"40\" step=\"1\" value=\"{{ days }}\" oninput=\"{{ onDays }}\" style=\"width:100%;accent-color:#0E4FB3\">\n              <div style=\"margin-top:6px;font-size:13px;color:#6b7480\">Denní sazba sestavy: <strong>{{ rate }} Kč/m²/den<\u002Fstrong> <span style=\"color:#9aa3ae\">(1–5 dní 14 · 6–20 dní 11 · 20+ dní 8)<\u002Fspan><\u002Fdiv>\n            <\u002Fdiv>\n\n            <div style=\"margin-bottom:22px\">\n              <div style=\"display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px\"><label style=\"font-weight:700;font-size:15px\">Vzdálenost na stavbu<\u002Flabel><span style=\"font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:22px;color:#0E4FB3\">{{ km }} km<\u002Fspan><\u002Fdiv>\n              <input type=\"range\" min=\"0\" max=\"120\" step=\"1\" value=\"{{ km }}\" oninput=\"{{ onKm }}\" style=\"width:100%;accent-color:#0E4FB3\">\n              <div style=\"margin-top:6px;font-size:13px;color:#6b7480\">Do 50 km zdarma · nad 50 km 30 Kč/km<\u002Fdiv>\n            <\u002Fdiv>\n\n            <div style=\"display:flex;flex-direction:column;gap:12px;margin-top:18px\">\n              <button type=\"button\" onclick=\"{{ toggleRT }}\" style=\"display:flex;align-items:center;justify-content:space-between;gap:12px;background:#f4f6f9;border:1px solid #e1e6ee;border-radius:10px;padding:13px 16px;cursor:pointer;text-align:left\">\n                <span style=\"font-weight:700;font-size:15px\">Doprava tam i zpět<\u002Fspan>\n                <sc-if value=\"{{ roundtrip }}\" hint-placeholder-val=\"{{ true }}\"><span style=\"background:#0E4FB3;color:#fff;font-weight:800;font-size:13px;padding:5px 14px;border-radius:999px\">ANO<\u002Fspan><\u002Fsc-if>\n                <sc-if value=\"{{ notRoundtrip }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"background:#e1e6ee;color:#6b7480;font-weight:800;font-size:13px;padding:5px 14px;border-radius:999px\">NE<\u002Fspan><\u002Fsc-if>\n              <\u002Fbutton>\n              <button type=\"button\" onclick=\"{{ toggleAsm }}\" style=\"display:flex;align-items:center;justify-content:space-between;gap:12px;background:#f4f6f9;border:1px solid #e1e6ee;border-radius:10px;padding:13px 16px;cursor:pointer;text-align:left\">\n                <span style=\"font-weight:700;font-size:15px\">Montáž + odbednění <span style=\"color:#9aa3ae;font-weight:600\">(360 Kč/m²)<\u002Fspan><\u002Fspan>\n                <sc-if value=\"{{ assembly }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"background:#0E4FB3;color:#fff;font-weight:800;font-size:13px;padding:5px 14px;border-radius:999px\">ANO<\u002Fspan><\u002Fsc-if>\n                <sc-if value=\"{{ notAssembly }}\" hint-placeholder-val=\"{{ true }}\"><span style=\"background:#e1e6ee;color:#6b7480;font-weight:800;font-size:13px;padding:5px 14px;border-radius:999px\">NE<\u002Fspan><\u002Fsc-if>\n              <\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <!-- output -->\n          <div style=\"padding:34px;background:#f4f6f9;display:flex;flex-direction:column\">\n            <div style=\"display:grid;gap:11px;font-size:15px\">\n              <div style=\"display:flex;justify-content:space-between\"><span style=\"color:#5b6573\">Pronájem ({{ days }} dní × {{ rate }} Kč/m²)<\u002Fspan><strong>{{ pronajemFmt }} Kč<\u002Fstrong><\u002Fdiv>\n              <div style=\"display:flex;justify-content:space-between\"><span style=\"color:#5b6573\">Doprava<\u002Fspan><strong>{{ dopravaFmt }} Kč<\u002Fstrong><\u002Fdiv>\n              <div style=\"display:flex;justify-content:space-between\"><span style=\"color:#5b6573\">Montáž + odbednění<\u002Fspan><strong>{{ montazFmt }} Kč<\u002Fstrong><\u002Fdiv>\n              <div style=\"height:1px;background:#dde3eb;margin:4px 0\"><\u002Fdiv>\n              <div style=\"display:flex;justify-content:space-between;font-size:16px\"><span style=\"color:#5b6573\">Mezisoučet bez DPH <span style=\"color:#9aa3ae;font-size:12px\">(min. 1 500 Kč)<\u002Fspan><\u002Fspan><strong>{{ meziFmt }} Kč<\u002Fstrong><\u002Fdiv>\n              <div style=\"display:flex;justify-content:space-between\"><span style=\"color:#5b6573\">DPH 21 %<\u002Fspan><strong>{{ dphFmt }} Kč<\u002Fstrong><\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"margin-top:16px;background:#0E4FB3;color:#fff;border-radius:12px;padding:18px 22px;display:flex;justify-content:space-between;align-items:center\">\n              <span style=\"font-weight:700;font-size:16px\">Celkem s DPH<\u002Fspan>\n              <span style=\"font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:34px;line-height:1\">{{ celkemFmt }} Kč<\u002Fspan>\n            <\u002Fdiv>\n\n            <div style=\"margin-top:20px;background:#fff;border:1px solid #e1e6ee;border-radius:12px;padding:16px 18px\">\n              <div style=\"font-family:'Barlow Condensed',sans-serif;font-weight:800;text-transform:uppercase;font-size:15px;letter-spacing:.04em;color:#6b7480;margin-bottom:10px\">Odhad spotřeby materiálu<\u002Fdiv>\n              <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:10px;font-size:14px\">\n                <div style=\"display:flex;justify-content:space-between\"><span style=\"color:#5b6573\">Stojky<\u002Fspan><strong>≈ {{ stojky }} ks<\u002Fstrong><\u002Fdiv>\n                <div style=\"display:flex;justify-content:space-between\"><span style=\"color:#5b6573\">Trojnožky<\u002Fspan><strong>≈ {{ trojnozky }} ks<\u002Fstrong><\u002Fdiv>\n                <div style=\"display:flex;justify-content:space-between\"><span style=\"color:#5b6573\">Nosníky<\u002Fspan><strong>≈ {{ nosniky }} bm<\u002Fstrong><\u002Fdiv>\n                <div style=\"display:flex;justify-content:space-between\"><span style=\"color:#5b6573\">Desky<\u002Fspan><strong>≈ {{ desky }} m²<\u002Fstrong><\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <a href=\"#kontakty\" style=\"margin-top:18px;text-align:center;background:#F47A1F;color:#fff;font-weight:800;font-size:16px;padding:15px;border-radius:999px;box-shadow:0 4px 0 #c95f0d\">Odeslat tuto poptávku →<\u002Fa>\n            <p style=\"font-size:12px;color:#9aa3ae;margin:12px 0 0;text-align:center\">Orientační výpočet, nezávazné. Přesnou cenu potvrdíme podle výkresu.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- PRICE TABLE -->\n      <div class=\"pricewrap\" style=\"margin-top:48px;background:#fff;color:#14171c;border-radius:16px;overflow:hidden\">\n        <div style=\"padding:24px 28px 6px\"><h3 style=\"font-family:'Barlow Condensed',sans-serif;font-weight:800;text-transform:uppercase;font-size:24px;margin:0\">Ceník půjčovného<\u002Fh3><p style=\"color:#6b7480;font-size:14px;margin:6px 0 0\">Kč / ks / den bez DPH · podle délky pronájmu<\u002Fp><\u002Fdiv>\n        <div style=\"overflow-x:auto;padding:14px 28px 28px\">\n          <sc-for list=\"{{ priceRows }}\" as=\"r\" hint-placeholder-count=\"10\">\n                <\u002Fsc-for><table style=\"width:100%;border-collapse:collapse;font-size:15px;min-width:560px\">\n            <thead>\n              <tr style=\"text-align:left;color:#6b7480;font-size:13px;text-transform:uppercase;letter-spacing:.04em\">\n                <th style=\"padding:10px 8px;font-weight:700\">Položka<\u002Fth>\n                <th style=\"padding:10px 8px;font-weight:700;text-align:right\">1–5 dní<\u002Fth>\n                <th style=\"padding:10px 8px;font-weight:700;text-align:right\">6–20 dní<\u002Fth>\n                <th style=\"padding:10px 8px;font-weight:700;text-align:right\">20+ dní<\u002Fth>\n                <th style=\"padding:10px 8px;font-weight:700;text-align:right\">Kauce/ks<\u002Fth>\n              <\u002Ftr>\n            <\u002Fthead>\n            <tbody>\n              <tr style=\"border-top:1px solid #eef1f5\">\n                  <td style=\"padding:11px 8px;font-weight:700\">{{ r.name }}<\u002Ftd>\n                  <td style=\"padding:11px 8px;text-align:right\">{{ r.c1 }}<\u002Ftd>\n                  <td style=\"padding:11px 8px;text-align:right\">{{ r.c2 }}<\u002Ftd>\n                  <td style=\"padding:11px 8px;text-align:right\">{{ r.c3 }}<\u002Ftd>\n                  <td style=\"padding:11px 8px;text-align:right;color:#6b7480\">{{ r.dep }}<\u002Ftd>\n                <\u002Ftr>\n              \n            <\u002Ftbody>\n          <\u002Ftable>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- DOPLNKOVE SLUZBY -->\n      <div style=\"margin-top:24px;display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:14px\">\n        <div style=\"background:#1d2128;border-radius:12px;padding:18px 20px\"><div style=\"font-weight:700;color:#fff;font-size:15px\">Kompletní sestava<\u002Fdiv><div style=\"color:#F47A1F;font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:24px\">8–14 Kč/m²/den<\u002Fdiv><\u002Fdiv>\n        <div style=\"background:#1d2128;border-radius:12px;padding:18px 20px\"><div style=\"font-weight:700;color:#fff;font-size:15px\">Doprava<\u002Fdiv><div style=\"color:#F47A1F;font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:24px\">30 Kč/km<\u002Fdiv><div style=\"color:#aab3c0;font-size:12px\">do 50 km zdarma při zakázce nad 5 000 Kč<\u002Fdiv><\u002Fdiv>\n        <div style=\"background:#1d2128;border-radius:12px;padding:18px 20px\"><div style=\"font-weight:700;color:#fff;font-size:15px\">Montáž / odbednění<\u002Fdiv><div style=\"color:#F47A1F;font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:24px\">250 / 110 Kč/m²<\u002Fdiv><\u002Fdiv>\n        <div style=\"background:#1d2128;border-radius:12px;padding:18px 20px\"><div style=\"font-weight:700;color:#fff;font-size:15px\">Realizace na klíč<\u002Fdiv><div style=\"color:#F47A1F;font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:24px\">2 000–3 500 Kč/m²<\u002Fdiv><\u002Fdiv>\n        <div style=\"background:#1d2128;border-radius:12px;padding:18px 20px\"><div style=\"font-weight:700;color:#fff;font-size:15px\">Poradenství + kladecí plán<\u002Fdiv><div style=\"color:#F47A1F;font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:24px\">zdarma<\u002Fdiv><\u002Fdiv>\n        <div style=\"background:#1d2128;border-radius:12px;padding:18px 20px\"><div style=\"font-weight:700;color:#fff;font-size:15px\">Minimální půjčovné<\u002Fdiv><div style=\"color:#F47A1F;font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:24px\">1 500 Kč<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <p style=\"color:#7d8794;font-size:13px;margin:18px 0 0\">Všechny ceny jsou orientační a bez DPH. Konečnou nabídku zpracujeme zdarma podle výkresu stropu.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- JAK TO FUNGUJE -->\n  <section id=\"jaktofunguje\" style=\"background:#fff;padding:74px 24px\">\n    <div style=\"max-width:1180px;margin:0 auto\">\n      <div style=\"text-align:center;margin-bottom:44px\">\n        <span style=\"font-family:'Barlow Condensed',sans-serif;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#0E4FB3;font-size:15px\">Postup<\u002Fspan>\n        <h2 style=\"font-family:'Barlow Condensed',sans-serif;font-weight:800;text-transform:uppercase;font-size:clamp(30px,4.4vw,50px);line-height:.98;margin:6px 0 0\">Jak to funguje<\u002Fh2>\n      <\u002Fdiv>\n      <div class=\"steps\" style=\"display:grid;grid-template-columns:repeat(4,1fr);gap:22px\">\n        <div style=\"background:#f4f6f9;border-radius:14px;padding:26px 22px;border-top:5px solid #0E4FB3\">\n          <div style=\"font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:44px;color:#cdd7e6;line-height:1\">01<\u002Fdiv>\n          <div style=\"font-family:'Barlow Condensed',sans-serif;font-weight:800;text-transform:uppercase;font-size:19px;margin:6px 0 8px\">Poptávka / výkres<\u002Fdiv>\n          <p style=\"font-size:14.5px;color:#5b6573;line-height:1.5;margin:0\">Zavoláte nebo pošlete formulář a půdorys stropu. Stačí i rozměry.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"background:#f4f6f9;border-radius:14px;padding:26px 22px;border-top:5px solid #0E4FB3\">\n          <div style=\"font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:44px;color:#cdd7e6;line-height:1\">02<\u002Fdiv>\n          <div style=\"font-family:'Barlow Condensed',sans-serif;font-weight:800;text-transform:uppercase;font-size:19px;margin:6px 0 8px\">Kladecí plán a cena<\u002Fdiv>\n          <p style=\"font-size:14.5px;color:#5b6573;line-height:1.5;margin:0\">Zpracujeme kladecí plán a pevnou cenu — <strong>zdarma a nezávazně<\u002Fstrong>.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"background:#f4f6f9;border-radius:14px;padding:26px 22px;border-top:5px solid #0E4FB3\">\n          <div style=\"font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:44px;color:#cdd7e6;line-height:1\">03<\u002Fdiv>\n          <div style=\"font-family:'Barlow Condensed',sans-serif;font-weight:800;text-transform:uppercase;font-size:19px;margin:6px 0 8px\">Doprava na stavbu<\u002Fdiv>\n          <p style=\"font-size:14.5px;color:#5b6573;line-height:1.5;margin:0\">Bednění přivezeme na stavbu. Montáž a betonáž volitelně zařídíme my.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"background:#f4f6f9;border-radius:14px;padding:26px 22px;border-top:5px solid #F47A1F\">\n          <div style=\"font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:44px;color:#cdd7e6;line-height:1\">04<\u002Fdiv>\n          <div style=\"font-family:'Barlow Condensed',sans-serif;font-weight:800;text-transform:uppercase;font-size:19px;margin:6px 0 8px\">Po dokončení odvoz<\u002Fdiv>\n          <p style=\"font-size:14.5px;color:#5b6573;line-height:1.5;margin:0\">Po zatvrdnutí betonu bednění odbedníme a odvezeme zpět.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- REFERENCE -->\n  <section id=\"reference\" style=\"background:#f4f6f9;padding:74px 24px;border-top:1px solid #e4e8ee\">\n    <div style=\"max-width:1180px;margin:0 auto\">\n      <div style=\"text-align:center;margin-bottom:40px\">\n        <span style=\"font-family:'Barlow Condensed',sans-serif;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#0E4FB3;font-size:15px\">Reference<\u002Fspan>\n        <h2 style=\"font-family:'Barlow Condensed',sans-serif;font-weight:800;text-transform:uppercase;font-size:clamp(30px,4.4vw,50px);line-height:.98;margin:6px 0 0\">Hotové stropy a bednění<\u002Fh2>\n      <\u002Fdiv>\n      <div class=\"ref-grid\" style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:14px\">\n        <div style=\"position:relative;aspect-ratio:1/1;border-radius:12px;overflow:hidden;background:linear-gradient(150deg,rgba(111,147,212,.26),rgba(28,65,137,.5)),url(foto-1.jpg) center/cover\"><\u002Fdiv><div style=\"position:relative;aspect-ratio:1/1;border-radius:12px;overflow:hidden;background:linear-gradient(150deg,rgba(111,147,212,.26),rgba(28,65,137,.5)),url(foto-3.jpg) center/cover\"><\u002Fdiv><div style=\"position:relative;aspect-ratio:1/1;border-radius:12px;overflow:hidden;background:linear-gradient(150deg,rgba(111,147,212,.26),rgba(28,65,137,.5)),url(foto-5.jpg) center/cover\"><\u002Fdiv><div style=\"position:relative;aspect-ratio:1/1;border-radius:12px;overflow:hidden;background:linear-gradient(150deg,rgba(111,147,212,.26),rgba(28,65,137,.5)),url(foto-6.jpg) center/cover\"><\u002Fdiv><div style=\"position:relative;aspect-ratio:1/1;border-radius:12px;overflow:hidden;background:linear-gradient(150deg,rgba(111,147,212,.26          <\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- OWNER HANDOFF NOTE -->\n  <section style=\"background:#eef1f5;padding:54px 24px;border-top:2px dashed #c2cad6\">\n    <div style=\"max-width:1180px;margin:0 auto\">\n      <div style=\"display:inline-block;background:#F47A1F;color:#fff;font-family:'Barlow Condensed',sans-serif;font-weight:800;text-transform:uppercase;letter-spacing:.05em;font-size:13px;padding:5px 12px;border-radius:6px;margin-bottom:16px\">Poznámka pro majitele — před spuštěním smažte<\u002Fdiv>\n      <div class=\"twocol\" style=\"display:grid;grid-template-columns:1fr 1fr;gap:34px\">\n        <div>\n          <h3 style=\"font-family:'Barlow Condensed',sans-serif;font-weight:800;text-transform:uppercase;font-size:22px;margin:0 0 12px\">Návrhy názvu + claim<\u002Fh3>\n          <ul style=\"margin:0;padding-left:18px;line-height:1.85;font-size:15px;color:#2b313a\">\n            <li><strong>STROPNÍK<\u002Fstrong> — „Strop bez starostí. Bednění i realizace.\"<\u002Fli>\n            <li><strong>BEDNĚNÍ SEVER<\u002Fstrong> — „Stropní bednění skladem pro celý Ústecký kraj.\"<\u002Fli>\n            <li><strong>MONOLIT TEPLICE<\u002Fstrong> — „Monolitické stropy na klíč. S cenou předem.\"<\u002Fli>\n            <li><strong>STOJKA s.r.o.<\u002Fstrong> — „Půjčíme strop, postavíme strop.\"<\u002Fli>\n            <li><strong>STROPCENTRUM<\u002Fstrong> — „Vše pro váš monolitický strop na jednom místě.\"<\u002Fli>\n            <li><strong>PODEPŘENO<\u002Fstrong> — „Bednění, na které se spolehnete.\"<\u002Fli>\n            <li><strong>BETONUS / STROPLINE<\u002Fstrong> — „Rovný strop, férová cena, rychlý termín.\"<\u002Fli>\n          <\u002Ful>\n          <p style=\"font-size:14px;color:#5b6573;margin:12px 0 0\">Logo: silný černý wordmark v kondenzovaném řezu + modrá stylizovaná „stojka/strop\" v jednom písmenu (viz ikona v hlavičce).<\u002Fp>\n        <\u002Fdiv>\n        <div>\n          <h3 style=\"font-family:'Barlow Condensed',sans-serif;font-weight:800;text-transform:uppercase;font-size:22px;margin:0 0 12px\">Co dodat (fotky + údaje)<\u002Fh3>\n          <ul style=\"margin:0;padding-left:18px;line-height:1.7;font-size:15px;color:#2b313a\">\n            <li>Fotky <strong>stropního bednění<\u002Fstrong>: rastr stojek + nosníků H20 pod bedněným stropem (pohled zespodu/zešikma)<\u002Fli>\n            <li>Fotka <strong>skladu<\u002Fstrong> bednění (stojky, desky, trojnožky)<\u002Fli>\n            <li>Fotka <strong>betonáže<\u002Fstrong> a <strong>hotové<\u002Fstrong> rovné desky / podhledu<\u002Fli>\n            <li>6× foto do galerie referencí (různé stavby)<\u002Fli>\n            <li><strong>Název firmy + logo<\u002Fstrong>, IČO/DIČ, telefon, e-mail<\u002Fli>\n            <li>Skutečné <strong>ceny a kauce<\u002Fstrong> (ověřit tabulku), oblast dojezdu<\u002Fli>\n            <li>1–3 <strong>citace zákazníků<\u002Fstrong> + jméno/město<\u002Fli>\n            <li>Odkazy na soc. sítě, příp. Web3Forms/Formspree klíč pro formulář<\u002Fli>\n          <\u002Ful>\n          <p style=\"font-size:13px;color:#5b6573;margin:12px 0 0;background:#fff;border-radius:8px;padding:10px 12px\"><strong>Pozor na fotky:<\u002Fstrong> NE prkenné/stěnové bednění, ploty ani kanceláře — vždy stojky + nosníky + desky pod stropní deskou.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n<\u002Fmain>\n\n<!-- FOOTER -->\n<footer class=\"footer-split\" style=\"display:grid;grid-template-columns:1.6fr 1fr\">\n  <div style=\"background:#0E4FB3;color:#fff;padding:42px 40px\">\n    <div style=\"display:flex;align-items:center;gap:12px;margin-bottom:18px\">\n      <svg width=\"34\" height=\"30\" viewBox=\"0 0 34 30\" fill=\"none\" aria-hidden=\"true\"><rect x=\"2\" y=\"3\" width=\"30\" height=\"6\" rx=\"1.6\" fill=\"#fff\"><\u002Frect><rect x=\"5\" y=\"11\" width=\"4.4\" height=\"16\" rx=\"1.3\" fill=\"#fff\"><\u002Frect><rect x=\"15\" y=\"11\" width=\"4.4\" height=\"16\" rx=\"1.3\" fill=\"#fff\"><\u002Frect><rect x=\"25\" y=\"11\" width=\"4.4\" height=\"16\" rx=\"1.3\" fill=\"#fff\"><\u002Frect><\u002Fsvg>\n      <span style=\"font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:24px;text-transform:uppercase\">[NÁZEV FIRMY]<\u002Fspan>\n    <\u002Fdiv>\n    <p style=\"max-width:480px;color:#cfe0f8;font-size:15px;line-height:1.6;margin:0 0 16px\">Půjčovna stropního bednění a realizace monolitických železobetonových stropů na klíč na severu Čech.<\u002Fp>\n    <div style=\"font-weight:700;line-height:1.8;color:#eaf1fc\">Teplice · Ústí n. L. · Most · Chomutov · Děčín · Litoměřice<\u002Fdiv>\n    <div style=\"margin-top:18px;color:#9dc1f0;font-size:13px\">IČO: [_______] · DIČ: [_______] · © 2026 [NÁZEV FIRMY]. Všechna práva vyhrazena.<\u002Fdiv>\n  <\u002Fdiv>\n  <div style=\"background:#F47A1F;color:#fff;padding:42px 40px;display:flex;flex-direction:column;gap:16px\">\n    <div style=\"font-family:'Barlow Condensed',sans-serif;font-weight:800;text-transform:uppercase;font-size:18px;letter-spacing:.04em\">Spojte se s námi<\u002Fdiv>\n    <a href=\"tel:+420000000000\" style=\"font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:26px\">☎ [TELEFON]<\u002Fa>\n    <a href=\"mailto:[E-MAIL]\" style=\"font-weight:700;font-size:16px\">✉ [E-MAIL]<\u002Fa>\n    <div style=\"display:flex;gap:10px;margin-top:6px\">\n      <a href=\"#\" style=\"width:42px;height:42px;border-radius:50%;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-weight:800\">f<\u002Fa>\n      <a href=\"#\" style=\"width:42px;height:42px;border-radius:50%;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px\">IG<\u002Fa>\n      <a href=\"mailto:[E-MAIL]\" style=\"width:42px;height:42px;border-radius:50%;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-weight:800\">@<\u002Fa>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Ffooter>\n\n<!-- MOBILE STICKY BAR -->\n<div class=\"mobile-bar\" style=\"position:fixed;bottom:0;left:0;right:0;z-index:60;background:#14171c;padding:10px 14px;gap:10px;box-shadow:0 -4px 16px rgba(0,0,0,.25)\">\n  <a href=\"tel:+420000000000\" style=\"flex:1;display:flex;align-items:center;justify-content:center;gap:8px;background:#fff;color:#0E4FB3;font-weight:800;font-size:16px;padding:13px;border-radius:11px\">☎ Zavolat<\u002Fa>\n  <a href=\"#kontakty\" style=\"flex:1;display:flex;align-items:center;justify-content:center;gap:8px;background:#F47A1F;color:#fff;font-weight:800;font-size:16px;padding:13px;border-radius:11px\">Poptávka<\u002Fa>\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1280,&quot;height&quot;:900}}\">\nclass Component extends DCLogic {\n  state = {\n    area: 100, days: 10, km: 30, roundtrip: true, assembly: false,\n    form: { name:'', phone:'', email:'', type:'pujcovna', area:'', loc:'', term:'', msg:'' },\n    errors: {}, sent: false, active: ''\n  };\n\n  componentDidMount() {\n    try {\n      const ids = ['bedneni','realizace','cenik','jaktofunguje','reference','kontakty'];\n      this.io = new IntersectionObserver((entries) => {\n        entries.forEach(e => { if (e.isIntersecting) this.setState({ active: e.target.id }); });\n      }, { rootMargin: '-45% 0px -50% 0px' });\n      ids.forEach(id => { const el = document.getElementById(id); if (el) this.io.observe(el); });\n    } catch (e) {}\n  }\n  componentWillUnmount() { if (this.io) this.io.disconnect(); }\n\n  fmt(n) { return Math.round(n).toLocaleString('cs-CZ'); }\n  fmt1(n) { return (Math.round(n * 10) / 10).toLocaleString('cs-CZ'); }\n\n  calc() {\n    const { area, days, km, roundtrip, assembly } = this.state;\n    const rate = days <= 5 ? 14 : (days <= 20 ? 11 : 8);\n    const pronajem = area * rate * days;\n    const doprava = (km <= 50 ? 0 : km * 30) * (roundtrip ? 2 : 1);\n    const montaz = assembly ? area * 360 : 0;\n    const mezi = Math.max(pronajem + doprava + montaz, 1500);\n    const dph = mezi * 0.21;\n    const celkem = mezi * 1.21;\n    return { rate, pronajem, doprava, montaz, mezi, dph, celkem,\n      stojky: area * 0.7, trojnozky: area * 0.3, nosniky: area * 2.7, desky: area * 1.1 };\n  }\n\n  num(v, min) { const n = Number(v); return isNaN(n) ? min : Math.max(min, n); }\n  upd(k, v) { this.setState(s => ({ form: { ...s.form, [k]: v } })); }\n\n  submit = (e) => {\n    if (e && e.preventDefault) e.preventDefault();\n    const f = this.state.form;\n    const errors = {};\n    if (!f.name.trim()) errors.name = 'Vyplňte prosím jméno.';\n    if (!f.phone.trim()) errors.phone = 'Vyplňte prosím telefon.';\n    if (f.email.trim() && !/^[^@\\s]+@[^@\\s]+\\.[^@\\s]+$/.test(f.email.trim())) errors.email = 'Neplatný e-mail.';\n    if (Object.keys(errors).length) { this.setState({ errors }); return; }\n    const typeLabel = { pujcovna:'Půjčovna bednění', realizace:'Realizace stropu na klíč', nevim:'Nevím / poradit' }[f.type] || f.type;\n    const body = [\n      'Jméno: ' + f.name,\n      'Telefon: ' + f.phone,\n      'E-mail: ' + (f.email || '—'),\n      'Mám zájem o: ' + typeLabel,\n      'Plocha stropu: ' + (f.area || '—') + ' m²',\n      'Lokalita: ' + (f.loc || '—'),\n      'Termín: ' + (f.term || '—'),\n      '',\n      'Zpráva:',\n      f.msg || '—'\n    ].join('\\n');\n    const href = 'mailto:[E-MAIL]?subject=' + encodeURIComponent('Poptávka z webu — ' + typeLabel) + '&body=' + encodeURIComponent(body);\n    try { window.location.href = href; } catch (e) {}\n    this.setState({ errors: {}, sent: true });\n  };\n\n  renderVals() {\n    const c = this.calc();\n    const f = this.state.form, er = this.state.errors, a = this.state.active;\n    const tBtn = (active) => active\n      ? { Bg: '#0E4FB3', Border: '#0E4FB3', Color: '#ffffff' }\n      : { Bg: '#22262e', Border: '#333a45', Color: '#aab3c0' };\n    const tp = tBtn(f.type === 'pujcovna'), tr = tBtn(f.type === 'realizace'), tn = tBtn(f.type === 'nevim');\n\n    return {\n      area: this.state.area, days: this.state.days, km: this.state.km,\n      roundtrip: this.state.roundtrip, notRoundtrip: !this.state.roundtrip,\n      assembly: this.state.assembly, notAssembly: !this.state.assembly,\n      rate: c.rate,\n      pronajemFmt: this.fmt(c.pronajem), dopravaFmt: this.fmt(c.doprava),\n      montazFmt: this.fmt(c.montaz), meziFmt: this.fmt(c.mezi),\n      dphFmt: this.fmt(c.dph), celkemFmt: this.fmt(c.celkem),\n      stojky: this.fmt(c.stojky), trojnozky: this.fmt(c.trojnozky),\n      nosniky: this.fmt1(c.nosniky), desky: this.fmt1(c.desky),\n\n      onArea: (e) => this.setState({ area: this.num(e.target.value, 10) }),\n      onDays: (e) => this.setState({ days: this.num(e.target.value, 1) }),\n      onKm: (e) => this.setState({ km: this.num(e.target.value, 0) }),\n      toggleRT: () => this.setState(s => ({ roundtrip: !s.roundtrip })),\n      toggleAsm: () => this.setState(s => ({ assembly: !s.assembly })),\n\n      priceRows: [\n        { name:'Stojka 250', c1:'4', c2:'3', c3:'2,5', dep:'200' },\n        { name:'Stojka 300', c1:'5', c2:'4', c3:'3', dep:'200' },\n        { name:'Stojka 400', c1:'6', c2:'5', c3:'4', dep:'250' },\n        { name:'Stojka 500', c1:'8', c2:'6', c3:'5', dep:'300' },\n        { name:'Trojnožka', c1:'3', c2:'2,5', c3:'2', dep:'150' },\n        { name:'Křížová hlava', c1:'1', c2:'0,8', c3:'0,6', dep:'50' },\n        { name:'Přímá hlava', c1:'0,8', c2:'0,6', c3:'0,5', dep:'50' },\n        { name:'Nosník H20 / GT24 (bm)', c1:'1', c2:'0,8', c3:'0,6', dep:'80' },\n        { name:'Bednicí deska (m²)', c1:'6', c2:'5', c3:'3,5', dep:'150' },\n        { name:'T-PLEX deska (m²)', c1:'9', c2:'7', c3:'5', dep:'300' }\n      ],\n\n      refTiles: [\n        '[FOTO 1] hotová rovná stropní deska, pohled na podhled',\n        '[FOTO 2] rastr stojek + nosníků pod bedněním, RD',\n        '[FOTO 3] uložená výztuž na bednicích deskách před betonáží',\n        '[FOTO 4] betonáž stropu čerpadlem',\n        '[FOTO 5] sklad bednění — stojky, desky, trojnožky',\n        '[FOTO 6] odbedněný hotový strop bytového objektu'\n      ],\n\n      aBedneni: a==='bedneni', aRealizace: a==='realizace', aCenik: a==='cenik',\n      aJak: a==='jaktofunguje', aReference: a==='reference', aKontakty: a==='kontakty',\n\n      // form\n      fName: f.name, fPhone: f.phone, fEmail: f.email, fArea: f.area, fLoc: f.loc, fTerm: f.term, fMsg: f.msg,\n      setName: (e) => this.upd('name', e.target.value),\n      setPhone: (e) => this.upd('phone', e.target.value),\n      setEmail: (e) => this.upd('email', e.target.value),\n      setFArea: (e) => this.upd('area', e.target.value),\n      setLoc: (e) => this.upd('loc', e.target.value),\n      setTerm: (e) => this.upd('term', e.target.value),\n      setMsg: (e) => this.upd('msg', e.target.value),\n      setTypeP: () => this.upd('type', 'pujcovna'),\n      setTypeR: () => this.upd('type', 'realizace'),\n      setTypeN: () => this.upd('type', 'nevim'),\n      typePBg: tp.Bg, typePBorder: tp.Border, typePColor: tp.Color,\n      typeRBg: tr.Bg, typeRBorder: tr.Border, typeRColor: tr.Color,\n      typeNBg: tn.Bg, typeNBorder: tn.Border, typeNColor: tn.Color,\n      errName: er.name || '', errPhone: er.phone || '', errEmail: er.email || '',\n      submit: this.submit, sent: this.state.sent, notSent: !this.state.sent\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
