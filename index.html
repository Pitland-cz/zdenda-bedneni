document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

solid #23272D\">\n        <svg width=\"26\" height=\"26\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#1C6CA8\" stroke-width=\"1.7\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M1 5h11v9H1z\"><\u002Fpath><path d=\"M12 8h4l3 3v3h-7z\"><\u002Fpath><circle cx=\"5.5\" cy=\"17\" r=\"1.8\"><\u002Fcircle><circle cx=\"16\" cy=\"17\" r=\"1.8\"><\u002Fcircle><\u002Fsvg>\n        <div><div style=\"font-family:'Archivo',sans-serif;font-weight:700;font-size:17px\">Přivezeme<\u002Fdiv><div style=\"color:#9AA0A6;font-size:14px\">Doprava do 50 km zdarma<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex;align-items:center;gap:14px;padding:22px 18px\">\n        <svg width=\"26\" height=\"26\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#1C6CA8\" stroke-width=\"1.7\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M3 5h18\"><\u002Fpath><path d=\"M6 5v15\"><\u002Fpath><path d=\"M12 5v15\"><\u002Fpath><path d=\"M18 5v15\"><\u002Fpath><\u002Fsvg>\n        <div><div style=\"font-family:'Archivo',sans-serif;font-weight:700;font-size:17px\">Postavíme<\u002Fdiv><div style=\"color:#9AA0A6;font-size:14px\">Montáž, nebo strop na klíč<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ===================== PŮJČOVNA ===================== -->\n<section id=\"pujcovna\" style=\"background:#FFFFFF\">\n  <div style=\"max-width:1240px;margin:0 auto;padding:clamp(60px,8vw,104px) 22px\">\n    <div style=\"display:flex;gap:clamp(32px,5vw,64px);flex-wrap:wrap;align-items:flex-start\">\n      <div style=\"flex:1 1 440px;min-width:290px\">\n        <div style=\"font-family:'Space Mono',monospace;font-size:13px;letter-spacing:.06em;color:#1C6CA8;font-weight:700;margin-bottom:14px\">01 — PŮJČOVNA BEDNĚNÍ<\u002Fdiv>\n        <h2 style=\"font-family:'Archivo',sans-serif;font-weight:800;font-size:clamp(28px,3.6vw,42px);line-height:1.08;letter-spacing:-0.02em;margin:0 0 18px\">Půjčíte si bednění.<br>My ho přivezeme na stavbu.<\u002Fh2>\n        <p style=\"font-size:17px;line-height:1.6;color:#54565C;max-width:560px;margin:0 0 28px\">Pro stavební firmy i&nbsp;lidi, co staví svépomocí. Kompletní stropní bednění skladem na severu Čech. Půjčíme i&nbsp;malou plochu, poradíme se sestavou a&nbsp;zdarma uděláme kladecí plán.<\u002Fp>\n\n        <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:10px 18px;margin-bottom:30px\">\n          <div style=\"display:flex;gap:10px;align-items:flex-start\"><svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#1C6CA8\" stroke-width=\"2.3\" stroke-linecap=\"round\" stroke-linejoin=\"round\" style=\"margin-top:2px;flex:none\"><path d=\"M20 6L9 17l-5-5\"><\u002Fpath><\u002Fsvg><span style=\"font-size:15.5px;color:#2C2E33\"><strong>Stojky<\u002Fstrong> 250–500 cm + trojnožky<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex;gap:10px;align-items:flex-start\"><svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#1C6CA8\" stroke-width=\"2.3\" stroke-linecap=\"round\" stroke-linejoin=\"round\" style=\"margin-top:2px;flex:none\"><path d=\"M20 6L9 17l-5-5\"><\u002Fpath><\u002Fsvg><span style=\"font-size:15.5px;color:#2C2E33\"><strong>Hlavy<\u002Fstrong> křížové i&nbsp;přímé<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex;gap:10px;align-items:flex-start\"><svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#1C6CA8\" stroke-width=\"2.3\" stroke-linecap=\"round\" stroke-linejoin=\"round\" style=\"margin-top:2px;flex:none\"><path d=\"M20 6L9 17l-5-5\"><\u002Fpath><\u002Fsvg><span style=\"font-size:15.5px;color:#2C2E33\"><strong>Nosníky<\u002Fstrong> H20 / GT24<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex;gap:10px;align-items:flex-start\"><svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#1C6CA8\" stroke-width=\"2.3\" stroke-linecap=\"round\" stroke-linejoin=\"round\" style=\"margin-top:2px;flex:none\"><path d=\"M20 6L9 17l-5-5\"><\u002Fpath><\u002Fsvg><span style=\"font-size:15.5px;color:#2C2E33\"><strong>Bednicí desky<\u002Fstrong><\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex;gap:10px;align-items:flex-start\"><svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#1C6CA8\" stroke-width=\"2.3\" stroke-linecap=\"round\" stroke-linejoin=\"round\" style=\"margin-top:2px;flex:none\"><path d=\"M20 6L9 17l-5-5\"><\u002Fpath><\u002Fsvg><span style=\"font-size:15.5px;color:#2C2E33\"><strong>T-PLEX desky<\u002Fstrong> na pohledový beton<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex;gap:10px;align-items:flex-start\"><svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#1C6CA8\" stroke-width=\"2.3\" stroke-linecap=\"round\" stroke-linejoin=\"round\" style=\"margin-top:2px;flex:none\"><path d=\"M20 6L9 17l-5-5\"><\u002Fpath><\u002Fsvg><span style=\"font-size:15.5px;color:#2C2E33\"><strong>Kompletní sestava<\u002Fstrong> na míru<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"display:flex;flex-wrap:wrap;gap:8px;margin-bottom:30px\">\n          <span style=\"font-size:13.5px;font-weight:600;color:#2C2E33;background:#F2F0EC;border:1px solid #E3E0D9;padding:7px 13px;border-radius:999px\">Skladem<\u002Fspan>\n          <span style=\"font-size:13.5px;font-weight:600;color:#2C2E33;background:#F2F0EC;border:1px solid #E3E0D9;padding:7px 13px;border-radius:999px\">Doprava na stavbu<\u002Fspan>\n          <span style=\"font-size:13.5px;font-weight:600;color:#2C2E33;background:#F2F0EC;border:1px solid #E3E0D9;padding:7px 13px;border-radius:999px\">I&nbsp;malé množství<\u002Fspan>\n          <span style=\"font-size:13.5px;font-weight:600;color:#2C2E33;background:#F2F0EC;border:1px solid #E3E0D9;padding:7px 13px;border-radius:999px\">Pásmové slevy podle délky<\u002Fspan>\n          <span style=\"font-size:13.5px;font-weight:600;color:#fff;background:#1C6CA8;padding:7px 13px;border-radius:999px\">Kladecí plán zdarma<\u002Fspan>\n        <\u002Fdiv>\n        <a href=\"#kontakt\" style=\"display:inline-flex;align-items:center;gap:9px;background:#16181C;color:#fff;text-decoration:none;padding:14px 22px;border-radius:10px;font-weight:700;font-size:16px;transition:background .15s\" style-hover=\"background:#2A2E33\">Poptat půjčovné\n          <svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#fff\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M5 12h14M13 6l6 6-6 6\"><\u002Fpath><\u002Fsvg><\u002Fa>\n      <\u002Fdiv>\n      <div style=\"flex:1 1 360px;min-width:280px;align-self:stretch\">\n        <div style=\"position:relative;border-radius:16px;border:1px solid #E7E4DE;background:repeating-linear-gradient(135deg,#ECEAE5 0 17px,#F4F2EE 17px 34px);min-height:380px;height:100%;display:flex;align-items:flex-end;padding:18px\">\n          <span style=\"font-family:'Space Mono',monospace;font-size:12px;line-height:1.5;color:#6B6860;background:#FAF9F7;border:1px solid #E0DCD4;padding:9px 13px;border-radius:10px;max-width:90%\">FOTO → naskládané stojky a&nbsp;nosníky ve skladu / detail hlavy a&nbsp;nosníku H20<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ===================== REALIZACE ===================== -->\n<section id=\"realizace\" style=\"background:#F2F0EC\">\n  <div style=\"max-width:1240px;margin:0 auto;padding:clamp(60px,8vw,104px) 22px\">\n    <div style=\"display:flex;gap:clamp(32px,5vw,64px);flex-wrap:wrap-reverse;align-items:flex-start\">\n      <div style=\"flex:1 1 360px;min-width:280px;align-self:stretch\">\n        <div style=\"position:relative;border-radius:16px;border:1px solid #DFDBD3;background:repeating-linear-gradient(135deg,#E6E3DC 0 17px,#EEEBE4 17px 34px);min-height:380px;height:100%;display:flex;align-items:flex-end;padding:18px\">\n          <span style=\"font-family:'Space Mono',monospace;font-size:12px;line-height:1.5;color:#6B6860;background:#FAF9F7;border:1px solid #DAD6CD;padding:9px 13px;border-radius:10px;max-width:90%\">FOTO → hotový vybetonovaný monolitický strop / parta při betonáži s&nbsp;čerpadlem<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"flex:1 1 440px;min-width:290px\">\n        <div style=\"font-family:'Space Mono',monospace;font-size:13px;letter-spacing:.06em;color:#1C6CA8;font-weight:700;margin-bottom:14px\">02 — REALIZACE NA KLÍČ<\u002Fdiv>\n        <h2 style=\"font-family:'Archivo',sans-serif;font-weight:800;font-size:clamp(28px,3.6vw,42px);line-height:1.08;letter-spacing:-0.02em;margin:0 0 18px\">Chcete strop hotový?<br>Uděláme ho celý.<\u002Fh2>\n        <p style=\"font-size:17px;line-height:1.6;color:#54565C;max-width:560px;margin:0 0 28px\">Kompletní monolitický železobetonový strop — <strong>bednění + výztuž + betonáž<\u002Fstrong>. Pro investory a&nbsp;stavebníky, kteří nechtějí nic řešit. Přijedeme, postavíme, vybetonujeme a&nbsp;po zatvrdnutí odbedníme.<\u002Fp>\n\n        <div style=\"background:#fff;border:1px solid #E3E0D9;border-radius:14px;padding:22px 24px;margin-bottom:28px\">\n          <div style=\"font-weight:700;font-size:15px;color:#16181C;margin-bottom:14px\">Co zařídíme za vás<\u002Fdiv>\n          <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:11px 18px\">\n            <div style=\"display:flex;gap:10px;align-items:flex-start\"><svg width=\"19\" height=\"19\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#1C6CA8\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\" style=\"margin-top:1px;flex:none\"><path d=\"M20 6L9 17l-5-5\"><\u002Fpath><\u002Fsvg><span style=\"font-size:15px;color:#2C2E33\">Návrh sestavy + kladecí plán<\u002Fspan><\u002Fdiv>\n            <div style=\"display:flex;gap:10px;align-items:flex-start\"><svg width=\"19\" height=\"19\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#1C6CA8\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\" style=\"margin-top:1px;flex:none\"><path d=\"M20 6L9 17l-5-5\"><\u002Fpath><\u002Fsvg><span style=\"font-size:15px;color:#2C2E33\">Montáž bednění<\u002Fspan><\u002Fdiv>\n            <div style=\"display:flex;gap:10px;align-items:flex-start\"><svg width=\"19\" height=\"19\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#1C6CA8\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\" style=\"margin-top:1px;flex:none\"><path d=\"M20 6L9 17l-5-5\"><\u002Fpath><\u002Fsvg><span style=\"font-size:15px;color:#2C2E33\">Uložení výztuže dle PD<\u002Fspan><\u002Fdiv>\n            <div style=\"display:flex;gap:10px;align-items:flex-start\"><svg width=\"19\" height=\"19\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#1C6CA8\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\" style=\"margin-top:1px;flex:none\"><path d=\"M20 6L9 17l-5-5\"><\u002Fpath><\u002Fsvg><span style=\"font-size:15px;color:#2C2E33\">Betonáž a&nbsp;hutnění<\u002Fspan><\u002Fdiv>\n            <div style=\"display:flex;gap:10px;align-items:flex-start\"><svg width=\"19\" height=\"19\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#1C6CA8\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\" style=\"margin-top:1px;flex:none\"><path d=\"M20 6L9 17l-5-5\"><\u002Fpath><\u002Fsvg><span style=\"font-size:15px;color:#2C2E33\">Odbednění a&nbsp;odvoz<\u002Fspan><\u002Fdiv>\n            <div style=\"display:flex;gap:10px;align-items:flex-start\"><svg width=\"19\" height=\"19\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#1C6CA8\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\" style=\"margin-top:1px;flex:none\"><path d=\"M20 6L9 17l-5-5\"><\u002Fpath><\u002Fsvg><span style=\"font-size:15px;color:#2C2E33\">Jeden partner, jedna faktura<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <a href=\"#kontakt\" style=\"display:inline-flex;align-items:center;gap:9px;background:#1C6CA8;color:#fff;text-decoration:none;padding:14px 22px;border-radius:10px;font-weight:700;font-size:16px;transition:background .15s\" style-hover=\"background:#14517E\">Poptat strop na klíč\n          <svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#fff\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M5 12h14M13 6l6 6-6 6\"><\u002Fpath><\u002Fsvg><\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ===================== CENÍK + KALKULAČKA ===================== -->\n<section id=\"cenik\" style=\"background:#FFFFFF\">\n  <div style=\"max-width:1240px;margin:0 auto;padding:clamp(60px,8vw,104px) 22px\">\n    <div style=\"max-width:680px;margin-bottom:40px\">\n      <div style=\"font-family:'Space Mono',monospace;font-size:13px;letter-spacing:.06em;color:#1C6CA8;font-weight:700;margin-bottom:14px\">03 — CENÍK &amp; KALKULAČKA<\u002Fdiv>\n      <h2 style=\"font-family:'Archivo',sans-serif;font-weight:800;font-size:clamp(28px,3.6vw,44px);line-height:1.06;letter-spacing:-0.02em;margin:0 0 14px\">Spočítejte si cenu hned.<\u002Fh2>\n      <p style=\"font-size:17px;line-height:1.6;color:#54565C;margin:0\">Žádné tajení sazeb. Posuňte hodnoty a&nbsp;rovnou vidíte orientační cenu pronájmu. Všechny ceny jsou <strong>bez DPH<\u002Fstrong> (jsme plátci DPH 21 %).<\u002Fp>\n    <\u002Fdiv>\n\n    <!-- CALCULATOR -->\n    <div style=\"display:flex;gap:clamp(20px,3vw,32px);flex-wrap:wrap;align-items:stretch;margin-bottom:56px\">\n      <!-- inputs -->\n      <div style=\"flex:1 1 380px;min-width:300px;background:#16181C;border-radius:18px;padding:clamp(24px,3vw,34px);color:#F2F0EC\">\n        <div style=\"font-family:'Archivo',sans-serif;font-weight:700;font-size:20px;margin-bottom:24px;display:flex;align-items:center;gap:9px\"><svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#1C6CA8\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><rect x=\"4\" y=\"2\" width=\"16\" height=\"20\" rx=\"2\"><\u002Frect><path d=\"M8 6h8M8 10h8M8 14h3\"><\u002Fpath><\u002Fsvg>Kalkulačka pronájmu<\u002Fdiv>\n\n        <div style=\"margin-bottom:24px\">\n          <div style=\"display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px\"><label style=\"font-size:15px;color:#C7CACE\">Plocha stropu<\u002Flabel><span style=\"font-family:'Archivo',sans-serif;font-weight:700;font-size:19px\">{{ plocha }} m²<\u002Fspan><\u002Fdiv>\n          <input type=\"range\" min=\"10\" max=\"400\" step=\"5\" value=\"{{ plocha }}\" oninput=\"{{ setPlocha }}\" style=\"width:100%;height:6px;cursor:pointer\">\n        <\u002Fdiv>\n        <div style=\"margin-bottom:24px\">\n          <div style=\"display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px\"><label style=\"font-size:15px;color:#C7CACE\">Počet dní pronájmu<\u002Flabel><span style=\"font-family:'Archivo',sans-serif;font-weight:700;font-size:19px\">{{ dny }} dní<\u002Fspan><\u002Fdiv>\n          <input type=\"range\" min=\"1\" max=\"60\" step=\"1\" value=\"{{ dny }}\" oninput=\"{{ setDny }}\" style=\"width:100%;height:6px;cursor:pointer\">\n        <\u002Fdiv>\n        <div style=\"margin-bottom:26px\">\n          <div style=\"display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px\"><label style=\"font-size:15px;color:#C7CACE\">Vzdálenost na stavbu<\u002Flabel><span style=\"font-family:'Archivo',sans-serif;font-weight:700;font-size:19px\">{{ km }} km<\u002Fspan><\u002Fdiv>\n          <input type=\"range\" min=\"0\" max=\"120\" step=\"1\" value=\"{{ km }}\" oninput=\"{{ setKm }}\" style=\"width:100%;height:6px;cursor:pointer\">\n        <\u002Fdiv>\n\n        <div style=\"display:flex;justify-content:space-between;align-items:center;padding:14px 0;border-top:1px solid #2A2E33\">\n          <span style=\"font-size:15px;color:#E7E9EB\">Doprava tam i&nbsp;zpět<\u002Fspan>\n          <button onclick=\"{{ toggleTamZpet }}\" aria-label=\"Doprava tam i zpět\" style=\"position:relative;width:48px;height:27px;border-radius:999px;border:none;cursor:pointer;background:{{ tzTrack }};transition:background .15s\"><span style=\"position:absolute;top:3px;left:3px;width:21px;height:21px;border-radius:50%;background:#fff;transition:transform .15s;transform:{{ tzKnob }}\"><\u002Fspan><\u002Fbutton>\n        <\u002Fdiv>\n        <div style=\"display:flex;justify-content:space-between;align-items:center;padding:14px 0;border-top:1px solid #2A2E33\">\n          <span style=\"font-size:15px;color:#E7E9EB\">Montáž + odbednění naší partou<\u002Fspan>\n          <button onclick=\"{{ toggleMontaz }}\" aria-label=\"Montáž a odbednění\" style=\"position:relative;width:48px;height:27px;border-radius:999px;border:none;cursor:pointer;background:{{ mzTrack }};transition:background .15s\"><span style=\"position:absolute;top:3px;left:3px;width:21px;height:21px;border-radius:50%;background:#fff;transition:transform .15s;transform:{{ mzKnob }}\"><\u002Fspan><\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- output -->\n      <div style=\"flex:1 1 380px;min-width:300px;background:#FAF9F7;border:1px solid #E7E4DE;border-radius:18px;padding:clamp(24px,3vw,34px);display:flex;flex-direction:column\">\n        <div style=\"display:flex;justify-content:space-between;padding:9px 0;font-size:15px\"><span style=\"color:#54565C\">Denní sazba <span style=\"color:#9A968D;font-size:13px\">({{ bandLabel }})<\u002Fspan><\u002Fspan><span style=\"font-weight:600\">{{ sazba }} Kč/m²/den<\u002Fspan><\u002Fdiv>\n        <div style=\"display:flex;justify-content:space-between;padding:9px 0;font-size:15px;border-top:1px solid #ECE9E3\"><span style=\"color:#54565C\">Pronájem<\u002Fspan><span style=\"font-weight:600\">{{ pronajemStr }}<\u002Fspan><\u002Fdiv>\n        <div style=\"display:flex;justify-content:space-between;padding:9px 0;font-size:15px;border-top:1px solid #ECE9E3\"><span style=\"color:#54565C\">Doprava <span style=\"color:#9A968D;font-size:13px\">{{ dopravaNote }}<\u002Fspan><\u002Fspan><span style=\"font-weight:600\">{{ dopravaStr }}<\u002Fspan><\u002Fdiv>\n        <div style=\"display:flex;justify-content:space-between;padding:9px 0;font-size:15px;border-top:1px solid #ECE9E3\"><span style=\"color:#54565C\">Montáž + odbednění<\u002Fspan><span style=\"font-weight:600\">{{ montazStr }}<\u002Fspan><\u002Fdiv>\n        <div style=\"display:flex;justify-content:space-between;padding:12px 0;font-size:15px;border-top:1px solid #ECE9E3;margin-top:4px\"><span style=\"color:#16181C;font-weight:700\">Mezisoučet bez DPH<\u002Fspan><span style=\"font-weight:700\">{{ mezisoucetStr }}<\u002Fspan><\u002Fdiv>\n        <div style=\"display:flex;justify-content:space-between;padding:9px 0;font-size:15px\"><span style=\"color:#54565C\">DPH 21 %<\u002Fspan><span style=\"font-weight:600\">{{ dphStr }}<\u002Fspan><\u002Fdiv>\n        <div style=\"display:flex;justify-content:space-between;align-items:baseline;padding:16px 18px;margin-top:8px;background:#16181C;border-radius:12px;color:#fff\">\n          <span style=\"font-weight:700;font-size:16px\">CELKEM s DPH<\u002Fspan><span style=\"font-family:'Archivo',sans-serif;font-weight:800;font-size:clamp(22px,3vw,28px);color:#4D9BD6\">{{ celkemStr }}<\u002Fspan>\n        <\u002Fdiv>\n\n        <div style=\"margin-top:18px;padding-top:16px;border-top:1px dashed #DAD6CD\">\n          <div style=\"font-size:13px;font-weight:700;color:#16181C;margin-bottom:10px;letter-spacing:.02em\">ODHAD SPOTŘEBY BEDNĚNÍ<\u002Fdiv>\n          <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px\">\n            <div style=\"background:#fff;border:1px solid #E7E4DE;border-radius:10px;padding:10px 12px\"><div style=\"font-family:'Archivo',sans-serif;font-weight:700;font-size:18px\">{{ stojkyStr }}<\u002Fdiv><div style=\"font-size:12.5px;color:#8A867D\">stojky (ks)<\u002Fdiv><\u002Fdiv>\n            <div style=\"background:#fff;border:1px solid #E7E4DE;border-radius:10px;padding:10px 12px\"><div style=\"font-family:'Archivo',sans-serif;font-weight:700;font-size:18px\">{{ trojnozkyStr }}<\u002Fdiv><div style=\"font-size:12.5px;color:#8A867D\">trojnožky (ks)<\u002Fdiv><\u002Fdiv>\n            <div style=\"background:#fff;border:1px solid #E7E4DE;border-radius:10px;padding:10px 12px\"><div style=\"font-family:'Archivo',sans-serif;font-weight:700;font-size:18px\">{{ nosnikyStr }}<\u002Fdiv><div style=\"font-size:12.5px;color:#8A867D\">nosníky (bm)<\u002Fdiv><\u002Fdiv>\n            <div style=\"background:#fff;border:1px solid #E7E4DE;border-radius:10px;padding:10px 12px\"><div style=\"font-family:'Archivo',sans-serif;font-weight:700;font-size:18px\">{{ deskyStr }}<\u002Fdiv><div style=\"font-size:12.5px;color:#8A867D\">desky (m²)<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n          <p style=\"font-size:12.5px;color:#9A968D;margin:12px 0 0;line-height:1.5\">Orientační odhad. Přesnou sestavu a&nbsp;cenu spočítáme zdarma podle výkresu.<\u002Fp>\n        <\u002Fdiv>\n        <a href=\"#kontakt\" style=\"margin-top:18px;display:inline-flex;align-items:center;justify-content:center;gap:9px;background:#1C6CA8;color:#fff;text-decoration:none;padding:14px;border-radius:10px;font-weight:700;font-size:16px;transition:background .15s\" style-hover=\"background:#14517E\">Chci přesnou nabídku zdarma<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- COMPONENT PRICE TABLE -->\n    <h3 style=\"font-family:'Archivo',sans-serif;font-weight:700;font-size:clamp(20px,2.4vw,26px);margin:0 0 6px\">Ceník komponent<\u002Fh3>\n    <p style=\"font-size:14.5px;color:#8A867D;margin:0 0 18px\">Kč / ks / den bez DPH · sazba podle délky pronájmu<\u002Fp>\n    <div style=\"overflow-x:auto;border:1px solid #E7E4DE;border-radius:14px;margin-bottom:30px\">\n      <table style=\"width:100%;border-collapse:collapse;min-width:600px;font-size:15px\">\n        <thead>\n          <tr style=\"background:#16181C;color:#fff;text-align:left\">\n            <th style=\"padding:14px 18px;font-weight:600;font-size:14px\">Komponenta<\u002Fth>\n            <th style=\"padding:14px 14px;font-weight:600;font-size:14px;text-align:right\">1–5 dní<\u002Fth>\n            <th style=\"padding:14px 14px;font-weight:600;font-size:14px;text-align:right\">6–20 dní<\u002Fth>\n            <th style=\"padding:14px 14px;font-weight:600;font-size:14px;text-align:right\">20+ dní<\u002Fth>\n            <th style=\"padding:14px 18px;font-weight:600;font-size:14px;text-align:right\">Kauce/ks<\u002Fth>\n          <\u002Ftr>\n        <\u002Fthead>\n        <tbody>\n          <tr style=\"border-top:1px solid #EFEDE9\"><td style=\"padding:13px 18px;font-weight:600\">Stojka 250 cm<\u002Ftd><td style=\"padding:13px 14px;text-align:right\">4<\u002Ftd><td style=\"padding:13px 14px;text-align:right\">3<\u002Ftd><td style=\"padding:13px 14px;text-align:right\">2,5<\u002Ftd><td style=\"padding:13px 18px;text-align:right;color:#8A867D\">200<\u002Ftd><\u002Ftr>\n          <tr style=\"border-top:1px solid #EFEDE9;background:#FAF9F7\"><td style=\"padding:13px 18px;font-weight:600\">Stojka 300 cm<\u002Ftd><td style=\"padding:13px 14px;text-align:right\">5<\u002Ftd><td style=\"padding:13px 14px;text-align:right\">4<\u002Ftd><td style=\"padding:13px 14px;text-align:right\">3<\u002Ftd><td style=\"padding:13px 18px;text-align:right;color:#8A867D\">200<\u002Ftd><\u002Ftr>\n          <tr style=\"border-top:1px solid #EFEDE9\"><td style=\"padding:13px 18px;font-weight:600\">Stojka 400 cm<\u002Ftd><td style=\"padding:13px 14px;text-align:right\">6<\u002Ftd><td style=\"padding:13px 14px;text-align:right\">5<\u002Ftd><td style=\"padding:13px 14px;text-align:right\">4<\u002Ftd><td style=\"padding:13px 18px;text-align:right;color:#8A867D\">250<\u002Ftd><\u002Ftr>\n          <tr style=\"border-top:1px solid #EFEDE9;background:#FAF9F7\"><td style=\"padding:13px 18px;font-weight:600\">Stojka 500 cm<\u002Ftd><td style=\"padding:13px 14px;text-align:right\">8<\u002Ftd><td style=\"padding:13px 14px;text-align:right\">6<\u002Ftd><td style=\"padding:13px 14px;text-align:right\">5<\u002Ftd><td style=\"padding:13px 18px;text-align:right;color:#8A867D\">300<\u002Ftd><\u002Ftr>\n          <tr style=\"border-top:1px solid #EFEDE9\"><td style=\"padding:13px 18px;font-weight:600\">Trojnožka<\u002Ftd><td style=\"padding:13px 14px;text-align:right\">3<\u002Ftd><td style=\"padding:13px 14px;text-align:right\">2,5<\u002Ftd><td style=\"padding:13px 14px;text-align:right\">2<\u002Ftd><td style=\"padding:13px 18px;text-align:right;color:#8A867D\">150<\u002Ftd><\u002Ftr>\n          <tr style=\"border-top:1px solid #EFEDE9;background:#FAF9F7\"><td style=\"padding:13px 18px;font-weight:600\">Křížová hlava<\u002Ftd><td style=\"padding:13px 14px;text-align:right\">1<\u002Ftd><td style=\"padding:13px 14px;text-align:right\">0,8<\u002Ftd><td style=\"padding:13px 14px;text-align:right\">0,6<\u002Ftd><td style=\"padding:13px 18px;text-align:right;color:#8A867D\">50<\u002Ftd><\u002Ftr>\n          <tr style=\"border-top:1px solid #EFEDE9\"><td style=\"padding:13px 18px;font-weight:600\">Přímá hlava<\u002Ftd><td style=\"padding:13px 14px;text-align:right\">0,8<\u002Ftd><td style=\"padding:13px 14px;text-align:right\">0,6<\u002Ftd><td style=\"padding:13px 14px;text-align:right\">0,5<\u002Ftd><td style=\"padding:13px 18px;text-align:right;color:#8A867D\">50<\u002Ftd><\u002Ftr>\n          <tr style=\"border-top:1px solid #EFEDE9;background:#FAF9F7\"><td style=\"padding:13px 18px;font-weight:600\">Nosník H20 / GT24 <span style=\"color:#8A867D;font-weight:400\">(bm)<\u002Fspan><\u002Ftd><td style=\"padding:13px 14px;text-align:right\">1<\u002Ftd><td style=\"padding:13px 14px;text-align:right\">0,8<\u002Ftd><td style=\"padding:13px 14px;text-align:right\">0,6<\u002Ftd><td style=\"padding:13px 18px;text-align:right;color:#8A867D\">80<\u002Ftd><\u002Ftr>\n          <tr style=\"border-top:1px solid #EFEDE9\"><td style=\"padding:13px 18px;font-weight:600\">Bednicí deska <span style=\"color:#8A867D;font-weight:400\">(m²)<\u002Fspan><\u002Ftd><td style=\"padding:13px 14px;text-align:right\">6<\u002Ftd><td style=\"padding:13px 14px;text-align:right\">5<\u002Ftd><td style=\"padding:13px 14px;text-align:right\">3,5<\u002Ftd><td style=\"padding:13px 18px;text-align:right;color:#8A867D\">150<\u002Ftd><\u002Ftr>\n          <tr style=\"border-top:1px solid #EFEDE9;background:#FAF9F7\"><td style=\"padding:13px 18px;font-weight:600\">T-PLEX deska <span style=\"color:#8A867D;font-weight:400\">(m²)<\u002Fspan><\u002Ftd><td style=\"padding:13px 14px;text-align:right\">9<\u002Ftd><td style=\"padding:13px 14px;text-align:right\">7<\u002Ftd><td style=\"padding:13px 14px;text-align:right\">5<\u002Ftd><td style=\"padding:13px 18px;text-align:right;color:#8A867D\">300<\u002Ftd><\u002Ftr>\n        <\u002Ftbody>\n      <\u002Ftable>\n    <\u002Fdiv>\n\n    <!-- DOPLŇKOVÉ SLUŽBY -->\n    <h3 style=\"font-family:'Archivo',sans-serif;font-weight:700;font-size:clamp(20px,2.4vw,26px);margin:0 0 18px\">Doplňkové služby<\u002Fh3>\n    <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:12px;margin-bottom:20px\">\n      <div style=\"background:#F2F0EC;border:1px solid #E3E0D9;border-radius:12px;padding:16px 18px\"><div style=\"font-size:14px;color:#54565C;margin-bottom:3px\">Kompletní sestava<\u002Fdiv><div style=\"font-family:'Archivo',sans-serif;font-weight:700;font-size:18px\">8–14 Kč/m²/den<\u002Fdiv><\u002Fdiv>\n      <div style=\"background:#F2F0EC;border:1px solid #E3E0D9;border-radius:12px;padding:16px 18px\"><div style=\"font-size:14px;color:#54565C;margin-bottom:3px\">Doprava<\u002Fdiv><div style=\"font-family:'Archivo',sans-serif;font-weight:700;font-size:18px\">30 Kč/km<\u002Fdiv><div style=\"font-size:12.5px;color:#8A867D\">do 50 km zdarma při zakázce nad 5 000 Kč<\u002Fdiv><\u002Fdiv>\n      <div style=\"background:#F2F0EC;border:1px solid #E3E0D9;border-radius:12px;padding:16px 18px\"><div style=\"font-size:14px;color:#54565C;margin-bottom:3px\">Montáž<\u002Fdiv><div style=\"font-family:'Archivo',sans-serif;font-weight:700;font-size:18px\">250 Kč/m²<\u002Fdiv><\u002Fdiv>\n      <div style=\"background:#F2F0EC;border:1px solid #E3E0D9;border-radius:12px;padding:16px 18px\"><div style=\"font-size:14px;color:#54565C;margin-bottom:3px\">Odbednění<\u002Fdiv><div style=\"font-family:'Archivo',sans-serif;font-weight:700;font-size:18px\">110 Kč/m²<\u002Fdiv><\u002Fdiv>\n      <div style=\"background:#1C6CA8;border:1px solid #1C6CA8;border-radius:12px;padding:16px 18px\"><div style=\"font-size:14px;color:#CFE2F2;margin-bottom:3px\">Poradenství + kladecí plán<\u002Fdiv><div style=\"font-family:'Archivo',sans-serif;font-weight:700;font-size:18px;color:#fff\">ZDARMA<\u002Fdiv><\u002Fdiv>\n      <div style=\"background:#F2F0EC;border:1px solid #E3E0D9;border-radius:12px;padding:16px 18px\"><div style=\"font-size:14px;color:#54565C;margin-bottom:3px\">Minimální půjčovné<\u002Fdiv><div style=\"font-family:'Archivo',sans-serif;font-weight:700;font-size:18px\">1 500 Kč<\u002Fdiv><\u002Fdiv>\n      <div style=\"background:#F2F0EC;border:1px solid #E3E0D9;border-radius:12px;padding:16px 18px\"><div style=\"font-size:14px;color:#54565C;margin-bottom:3px\">Realizace stropu na klíč<\u002Fdiv><div style=\"font-family:'Archivo',sans-serif;font-weight:700;font-size:18px\">2 000–3 500 Kč/m²<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n    <p style=\"font-size:13.5px;color:#8A867D;margin:0\">Všechny ceny jsou uvedeny bez DPH. [NÁZEV FIRMY] je plátcem DPH 21 %.<\u002Fp>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ===================== JAK TO FUNGUJE ===================== -->\n<section id=\"jak-to-funguje\" style=\"background:#16181C;color:#F2F0EC\">\n  <div style=\"max-width:1240px;margin:0 auto;padding:clamp(60px,8vw,104px) 22px\">\n    <div style=\"max-width:640px;margin-bottom:44px\">\n      <div style=\"font-family:'Space Mono',monospace;font-size:13px;letter-spacing:.06em;color:#4D9BD6;font-weight:700;margin-bottom:14px\">04 — JAK TO FUNGUJE<\u002Fdiv>\n      <h2 style=\"font-family:'Archivo',sans-serif;font-weight:800;font-size:clamp(28px,3.6vw,44px);line-height:1.06;letter-spacing:-0.02em;margin:0\">Čtyři kroky a&nbsp;máte hotovo.<\u002Fh2>\n    <\u002Fdiv>\n    <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:18px\">\n      <div style=\"background:#1E2227;border:1px solid #2A2E33;border-radius:16px;padding:26px 24px\">\n        <div style=\"font-family:'Archivo',sans-serif;font-weight:800;font-size:40px;color:#1C6CA8;line-height:1;margin-bottom:18px\">1<\u002Fdiv>\n        <div style=\"font-family:'Archivo',sans-serif;font-weight:700;font-size:18px;margin-bottom:8px\">Pošlete poptávku<\u002Fdiv>\n        <p style=\"font-size:14.5px;line-height:1.55;color:#9AA0A6;margin:0\">Stačí výkres nebo rozměry stropu. Telefonem, e-mailem nebo přes formulář.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"background:#1E2227;border:1px solid #2A2E33;border-radius:16px;padding:26px 24px\">\n        <div style=\"font-family:'Archivo',sans-serif;font-weight:800;font-size:40px;color:#1C6CA8;line-height:1;margin-bottom:18px\">2<\u002Fdiv>\n        <div style=\"font-family:'Archivo',sans-serif;font-weight:700;font-size:18px;margin-bottom:8px\">Navrhneme sestavu a&nbsp;cenu<\u002Fdiv>\n        <p style=\"font-size:14.5px;line-height:1.55;color:#9AA0A6;margin:0\">Zdarma uděláme kladecí plán a&nbsp;spočítáme přesnou cenu. Bez závazku.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"background:#1E2227;border:1px solid #2A2E33;border-radius:16px;padding:26px 24px\">\n        <div style=\"font-family:'Archivo',sans-serif;font-weight:800;font-size:40px;color:#1C6CA8;line-height:1;margin-bottom:18px\">3<\u002Fdiv>\n        <div style=\"font-family:'Archivo',sans-serif;font-weight:700;font-size:18px;margin-bottom:8px\">Přivezeme na stavbu<\u002Fdiv>\n        <p style=\"font-size:14.5px;line-height:1.55;color:#9AA0A6;margin:0\">Bednění dovezeme až k&nbsp;vám. Montáž party je volitelná — postavíme, nebo si postavíte sami.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"background:#1E2227;border:1px solid #2A2E33;border-radius:16px;padding:26px 24px\">\n        <div style=\"font-family:'Archivo',sans-serif;font-weight:800;font-size:40px;color:#1C6CA8;line-height:1;margin-bottom:18px\">4<\u002Fdiv>\n        <div style=\"font-family:'Archivo',sans-serif;font-weight:700;font-size:18px;margin-bottom:8px\">Po dokončení odvezeme<\u002Fdiv>\n        <p style=\"font-size:14.5px;line-height:1.55;color:#9AA0A6;margin:0\">Po zatvrdnutí betonu odbedníme a&nbsp;materiál si odvezeme zpět. Vy nic neřešíte.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ===================== REFERENCE ===================== -->\n<section id=\"reference\" style=\"background:#FFFFFF\">\n  <div style=\"max-width:1240px;margin:0 auto;padding:clamp(60px,8vw,104px) 22px\">\n    <div style=\"max-width:640px;margin-bottom:36px\">\n      <div style=\"font-family:'Space Mono',monospace;font-size:13px;letter-spacing:.06em;color:#1C6CA8;font-weight:700;margin-bottom:14px\">05 — REFERENCE<\u002Fdiv>\n      <h2 style=\"font-family:'Archivo',sans-serif;font-weight:800;font-size:clamp(28px,3.6vw,44px);line-height:1.06;letter-spacing:-0.02em;margin:0 0 12px\">Hotové stropy mluví za nás.<\u002Fh2>\n      <p style=\"font-size:16px;color:#54565C;margin:0\">Galerie realizací a&nbsp;pronájmů na severu Čech. <span style=\"font-family:'Space Mono',monospace;font-size:13px;color:#9A968D\">[doplňte vlastní fotky hotových zakázek]<\u002Fspan><\u002Fp>\n    <\u002Fdiv>\n    <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:14px;margin-bottom:40px\">\n      <div style=\"position:relative;border-radius:14px;border:1px solid #E7E4DE;background:repeating-linear-gradient(135deg,#ECEAE5 0 15px,#F4F2EE 15px 30px);aspect-ratio:4/3;display:flex;align-items:flex-end;padding:14px\"><span style=\"font-family:'Space Mono',monospace;font-size:11.5px;color:#6B6860;background:#FAF9F7;border:1px solid #E0DCD4;padding:6px 10px;border-radius:8px\">FOTO → hotový strop RD<\u002Fspan><\u002Fdiv>\n      <div style=\"position:relative;border-radius:14px;border:1px solid #E7E4DE;background:repeating-linear-gradient(135deg,#ECEAE5 0 15px,#F4F2EE 15px 30px);aspect-ratio:4/3;display:flex;align-items:flex-end;padding:14px\"><span style=\"font-family:'Space Mono',monospace;font-size:11.5px;color:#6B6860;background:#FAF9F7;border:1px solid #E0DCD4;padding:6px 10px;border-radius:8px\">FOTO → bednění zespodu<\u002Fspan><\u002Fdiv>\n      <div style=\"position:relative;border-radius:14px;border:1px solid #E7E4DE;background:repeating-linear-gradient(135deg,#ECEAE5 0 15px,#F4F2EE 15px 30px);aspect-ratio:4/3;display:flex;align-items:flex-end;padding:14px\"><span style=\"font-family:'Space Mono',monospace;font-size:11.5px;color:#6B6860;background:#FAF9F7;border:1px solid #E0DCD4;padding:6px 10px;border-radius:8px\">FOTO → betonáž / čerpadlo<\u002Fspan><\u002Fdiv>\n      <div style=\"position:relative;border-radius:14px;border:1px solid #E7E4DE;background:repeating-linear-gradient(135deg,#ECEAE5 0 15px,#F4F2EE 15px 30px);aspect-ratio:4/3;display:flex;align-items:flex-end;padding:14px\"><span style=\"font-family:'Space Mono',monospace;font-size:11.5px;color:#6B6860;background:#FAF9F7;border:1px solid #E0DCD4;padding:6px 10px;border-radius:8px\">FOTO → pohledový beton<\u002Fspan><\u002Fdiv>\n      <div style=\"position:relative;border-radius:14px;border:1px solid #E7E4DE;background:repeating-linear-gradient(135deg,#ECEAE5 0 15px,#F4F2EE 15px 30px);aspect-ratio:4/3;display:flex;align-items:flex-end;padding:14px\"><span style=\"font-family:'Space Mono',monospace;font-size:11.5px;color:#6B6860;background:#FAF9F7;border:1px solid #E0DCD4;padding:6px 10px;border-radius:8px\">FOTO → sklad / stojky<\u002Fspan><\u002Fdiv>\n      <div style=\"position:relative;border-radius:14px;border:1px solid #E7E4DE;background:repeating-linear-gradient(135deg,#ECEAE5 0 15px,#F4F2EE 15px 30px);aspect-ratio:4/3;display:flex;align-items:flex-end;padding:14px\"><span style=\"font-family:'Space Mono',monospace;font-size:11.5px;color:#6B6860;background:#FAF9F7;border:1px solid #E0DCD4;padding:6px 10px;border-radius:8px\">FOTO → detail nosníků<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"background:#F2F0EC;border-left:3px solid #1C6CA8;border-radius:0 14px 14px 0;padding:28px 30px;max-width:760px\">\n      <svg width=\"30\" height=\"30\" viewBox=\"0 0 24 24\" fill=\"#1C6CA8\" style=\"margin-bottom:10px;opacity:.85\"><path d=\"M9.5 6C6.5 7 5 9.5 5 13v5h6v-7H8c0-2 .8-3.2 2.5-3.8L9.5 6zm9 0c-3 1-4.5 3.5-4.5 7v5h6v-7h-3c0-2 .8-3.2 2.5-3.8L18.5 6z\"><\u002Fpath><\u002Fsvg>\n      <p style=\"font-size:18px;line-height:1.55;color:#2C2E33;font-weight:500;margin:0 0 14px\">„[Sem patří krátká reference zákazníka — např. o&nbsp;rychlém dovozu bednění, ochotě poradit nebo kvalitně odvedeném stropu na klíč.]\"<\u002Fp>\n      <div style=\"font-size:14px;color:#8A867D;font-family:'Space Mono',monospace\">— [Jméno zákazníka], [obec] · [typ zakázky]<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ===================== O NÁS ===================== -->\n<section id=\"o-nas\" style=\"background:#F2F0EC\">\n  <div style=\"max-width:1240px;margin:0 auto;padding:clamp(56px,7vw,90px) 22px\">\n    <div style=\"display:flex;gap:clamp(32px,5vw,60px);flex-wrap:wrap;align-items:center\">\n      <div style=\"flex:1 1 440px;min-width:290px\">\n        <div style=\"font-family:'Space Mono',monospace;font-size:13px;letter-spacing:.06em;color:#1C6CA8;font-weight:700;margin-bottom:14px\">06 — O NÁS<\u002Fdiv>\n        <h2 style=\"font-family:'Archivo',sans-serif;font-weight:800;font-size:clamp(26px,3.4vw,40px);line-height:1.08;letter-spacing:-0.02em;margin:0 0 18px\">Místní lidi, kteří stropům rozumí.<\u002Fh2>\n        <p style=\"font-size:17px;line-height:1.6;color:#54565C;margin:0 0 16px\">Za [NÁZEV FIRMY] stojí zkušený stavař ze severu Čech, který stropy roky staví i&nbsp;bední. Víme, co bednění obnáší v&nbsp;reálu na stavbě — proto půjčujeme férově, radíme na rovinu a&nbsp;jezdíme včas.<\u002Fp>\n        <p style=\"font-size:17px;line-height:1.6;color:#54565C;margin:0 0 24px\"><span style=\"font-family:'Space Mono',monospace;font-size:13px;color:#9A968D\">[Doplňte pár vět o&nbsp;zakladateli — kolik let v&nbsp;oboru, odkud je, co ho baví na monolitech.]<\u002Fspan><\u002Fp>\n        <div style=\"display:flex;flex-wrap:wrap;gap:8px\">\n          <span style=\"font-size:13.5px;font-weight:600;color:#2C2E33;background:#fff;border:1px solid #E3E0D9;padding:8px 14px;border-radius:999px\">Sever Čech<\u002Fspan>\n          <span style=\"font-size:13.5px;font-weight:600;color:#2C2E33;background:#fff;border:1px solid #E3E0D9;padding:8px 14px;border-radius:999px\">Férové podmínky<\u002Fspan>\n          <span style=\"font-size:13.5px;font-weight:600;color:#2C2E33;background:#fff;border:1px solid #E3E0D9;padding:8px 14px;border-radius:999px\">Bez skrytých poplatků<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"flex:1 1 320px;min-width:260px\">\n        <div style=\"position:relative;border-radius:16px;border:1px solid #DFDBD3;background:repeating-linear-gradient(135deg,#E6E3DC 0 16px,#EEEBE4 16px 32px);aspect-ratio:4/3.4;min-height:280px;display:flex;align-items:flex-end;padding:16px\"><span style=\"font-family:'Space Mono',monospace;font-size:12px;color:#6B6860;background:#FAF9F7;border:1px solid #DAD6CD;padding:8px 12px;border-radius:9px;max-width:90%\">FOTO → zakladatel na stavbě (v&nbsp;pracovním, ne v&nbsp;obleku)<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ===================== KONTAKT ===================== -->\n<section id=\"kontakt\" style=\"background:#FFFFFF\">\n  <div style=\"max-width:1240px;margin:0 auto;padding:clamp(60px,8vw,104px) 22px\">\n    <div style=\"display:flex;gap:clamp(28px,4vw,52px);flex-wrap:wrap;align-items:flex-start\">\n      <!-- contact info -->\n      <div style=\"flex:1 1 360px;min-width:290px\">\n        <div style=\"font-family:'Space Mono',monospace;font-size:13px;letter-spacing:.06em;color:#1C6CA8;font-weight:700;margin-bottom:14px\">07 — KONTAKT<\u002Fdiv>\n        <h2 style=\"font-family:'Archivo',sans-serif;font-weight:800;font-size:clamp(28px,3.6vw,44px);line-height:1.06;letter-spacing:-0.02em;margin:0 0 22px\">Ozvěte se. Odpovíme do 24 h.<\u002Fh2>\n\n        <a href=\"tel:+420000000000\" style=\"display:flex;align-items:center;gap:14px;text-decoration:none;color:#16181C;margin-bottom:14px\">\n          <span style=\"display:flex;align-items:center;justify-content:center;width:46px;height:46px;border-radius:11px;background:#1C6CA8;flex:none\"><svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#fff\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.13.96.36 1.9.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.91.34 1.85.57 2.81.7A2 2 0 0 1 22 16.92z\"><\u002Fpath><\u002Fsvg><\u002Fspan>\n          <span><span style=\"display:block;font-size:13px;color:#8A867D\">Telefon<\u002Fspan><span style=\"font-family:'Archivo',sans-serif;font-weight:700;font-size:20px\">+420 [TELEFON]<\u002Fspan><\u002Fspan>\n        <\u002Fa>\n        <a href=\"mailto:info@example.cz\" style=\"display:flex;align-items:center;gap:14px;text-decoration:none;color:#16181C;margin-bottom:24px\">\n          <span style=\"display:flex;align-items:center;justify-content:center;width:46px;height:46px;border-radius:11px;background:#16181C;flex:none\"><svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#fff\" stroke-width=\"1.9\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><rect x=\"3\" y=\"5\" width=\"18\" height=\"14\" rx=\"2\"><\u002Frect><path d=\"M3 7l9 6 9-6\"><\u002Fpath><\u002Fsvg><\u002Fspan>\n          <span><span style=\"display:block;font-size:13px;color:#8A867D\">E-mail<\u002Fspan><span style=\"font-family:'Archivo',sans-serif;font-weight:700;font-size:18px\">[E-MAIL]<\u002Fspan><\u002Fspan>\n        <\u002Fa>\n\n        <div style=\"background:#FAF9F7;border:1px solid #E7E4DE;border-radius:14px;padding:20px 22px;margin-bottom:18px\">\n          <div style=\"font-size:13px;color:#8A867D;margin-bottom:10px\">Oblast dojezdu — sever Čech<\u002Fdiv>\n          <div style=\"display:flex;flex-wrap:wrap;gap:7px\">\n            <span style=\"font-size:13.5px;font-weight:600;color:#2C2E33;background:#fff;border:1px solid #E3E0D9;padding:6px 12px;border-radius:8px\">Teplice<\u002Fspan>\n            <span style=\"font-size:13.5px;font-weight:600;color:#2C2E33;background:#fff;border:1px solid #E3E0D9;padding:6px 12px;border-radius:8px\">Ústí nad Labem<\u002Fspan>\n            <span style=\"font-size:13.5px;font-weight:600;color:#2C2E33;background:#fff;border:1px solid #E3E0D9;padding:6px 12px;border-radius:8px\">Most<\u002Fspan>\n            <span style=\"font-size:13.5px;font-weight:600;color:#2C2E33;background:#fff;border:1px solid #E3E0D9;padding:6px 12px;border-radius:8px\">Chomutov<\u002Fspan>\n            <span style=\"font-size:13.5px;font-weight:600;color:#2C2E33;background:#fff;border:1px solid #E3E0D9;padding:6px 12px;border-radius:8px\">Děčín<\u002Fspan>\n            <span style=\"font-size:13.5px;font-weight:600;color:#2C2E33;background:#fff;border:1px solid #E3E0D9;padding:6px 12px;border-radius:8px\">Litoměřice<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex;justify-content:space-between;font-size:14.5px;color:#54565C;padding:4px 2px\"><span>Provozní doba<\u002Fspan><span style=\"font-weight:600;color:#16181C\">Po–Pá 7:00–17:00 · So dle domluvy<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- form -->\n      <div style=\"flex:1 1 400px;min-width:300px\">\n        <sc-if value=\"{{ submitted }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"background:#16181C;border-radius:18px;padding:clamp(28px,4vw,44px);color:#F2F0EC;text-align:center;animation:fadeUp .35s ease\">\n            <div style=\"display:inline-flex;align-items:center;justify-content:center;width:64px;height:64px;border-radius:50%;background:#1C6CA8;margin-bottom:20px\"><svg width=\"30\" height=\"30\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#fff\" stroke-width=\"2.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M20 6L9 17l-5-5\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n            <h3 style=\"font-family:'Archivo',sans-serif;font-weight:800;font-size:26px;margin:0 0 12px\">Děkujeme za poptávku!<\u002Fh3>\n            <p style=\"font-size:16px;color:#BFC2C7;line-height:1.55;margin:0 0 24px\">Ozveme se vám do 24 hodin s&nbsp;návrhem sestavy a&nbsp;cenou. Spěchá to? Zavolejte rovnou.<\u002Fp>\n            <div style=\"display:flex;flex-wrap:wrap;gap:10px;justify-content:center\">\n              <a href=\"{{ mailtoHref }}\" style=\"display:inline-flex;align-items:center;gap:8px;background:#1C6CA8;color:#fff;text-decoration:none;padding:13px 20px;border-radius:10px;font-weight:700;font-size:15px\">Poslat i&nbsp;e-mailem<\u002Fa>\n              <button onclick=\"{{ resetForm }}\" style=\"background:transparent;color:#F2F0EC;border:1.5px solid #41464C;padding:13px 20px;border-radius:10px;font-weight:700;font-size:15px;cursor:pointer\">Odeslat další<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n        <sc-if value=\"{{ notSubmitted }}\" hint-placeholder-val=\"{{ true }}\">\n          <form onsubmit=\"{{ onSubmit }}\" style=\"background:#FAF9F7;border:1px solid #E7E4DE;border-radius:18px;padding:clamp(24px,3vw,34px)\">\n            <div style=\"font-family:'Archivo',sans-serif;font-weight:700;font-size:21px;margin-bottom:6px\">Nezávazná poptávka<\u002Fdiv>\n            <p style=\"font-size:14px;color:#8A867D;margin:0 0 22px\">Vyplňte, co víte. Zbytek doladíme po telefonu.<\u002Fp>\n\n            <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:14px;margin-bottom:14px\">\n              <div>\n                <label style=\"display:block;font-size:13.5px;font-weight:600;color:#2C2E33;margin-bottom:6px\">Jméno *<\u002Flabel>\n                <input type=\"text\" value=\"{{ fJmeno }}\" onchange=\"{{ setJmeno }}\" placeholder=\"Jan Novák\" style=\"width:100%;padding:12px 14px;border:1px solid #DDD9D1;border-radius:9px;font-size:15px;background:#fff;outline:none\" style-focus=\"border-color:#1C6CA8\">\n                <sc-if value=\"{{ errJmeno }}\"><div style=\"font-size:12.5px;color:#D14343;margin-top:5px\">{{ errJmeno }}<\u002Fdiv><\u002Fsc-if>\n              <\u002Fdiv>\n              <div>\n                <label style=\"display:block;font-size:13.5px;font-weight:600;color:#2C2E33;margin-bottom:6px\">Telefon *<\u002Flabel>\n                <input type=\"tel\" value=\"{{ fTelefon }}\" onchange=\"{{ setTelefon }}\" placeholder=\"+420 ...\" style=\"width:100%;padding:12px 14px;border:1px solid #DDD9D1;border-radius:9px;font-size:15px;background:#fff;outline:none\" style-focus=\"border-color:#1C6CA8\">\n                <sc-if value=\"{{ errTelefon }}\"><div style=\"font-size:12.5px;color:#D14343;margin-top:5px\">{{ errTelefon }}<\u002Fdiv><\u002Fsc-if>\n              <\u002Fdiv>\n            <\u002Fdiv>\n\n            <div style=\"margin-bottom:14px\">\n              <label style=\"display:block;font-size:13.5px;font-weight:600;color:#2C2E33;margin-bottom:6px\">E-mail<\u002Flabel>\n              <input type=\"email\" value=\"{{ fEmail }}\" onchange=\"{{ setEmail }}\" placeholder=\"vas@email.cz\" style=\"width:100%;padding:12px 14px;border:1px solid #DDD9D1;border-radius:9px;font-size:15px;background:#fff;outline:none\" style-focus=\"border-color:#1C6CA8\">\n              <sc-if value=\"{{ errEmail }}\"><div style=\"font-size:12.5px;color:#D14343;margin-top:5px\">{{ errEmail }}<\u002Fdiv><\u002Fsc-if>\n            <\u002Fdiv>\n\n            <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:14px;margin-bottom:14px\">\n              <div>\n                <label style=\"display:block;font-size:13.5px;font-weight:600;color:#2C2E33;margin-bottom:6px\">Co potřebujete? *<\u002Flabel>\n                <select value=\"{{ fTyp }}\" onchange=\"{{ setTyp }}\" style=\"width:100%;padding:12px 14px;border:1px solid #DDD9D1;border-radius:9px;font-size:15px;background:#fff;outline:none;accent-color:#1C6CA8\" style-focus=\"border-color:#1C6CA8\">\n                  <option value=\"\">— vyberte —<\u002Foption>\n                  <option value=\"Půjčovna bednění\">Půjčovna bednění<\u002Foption>\n                  <option value=\"Realizace stropu na klíč\">Realizace stropu na klíč<\u002Foption>\n                  <option value=\"Nevím, poradím se\">Nevím, poradím se<\u002Foption>\n                <\u002Fselect>\n                <sc-if value=\"{{ errTyp }}\"><div style=\"font-size:12.5px;color:#D14343;margin-top:5px\">{{ errTyp }}<\u002Fdiv><\u002Fsc-if>\n              <\u002Fdiv>\n              <div>\n                <label style=\"display:block;font-size:13.5px;font-weight:600;color:#2C2E33;margin-bottom:6px\">Plocha stropu (m²)<\u002Flabel>\n                <input type=\"number\" value=\"{{ fPlocha }}\" onchange=\"{{ setPlochaF }}\" placeholder=\"např. 80\" style=\"width:100%;padding:12px 14px;border:1px solid #DDD9D1;border-radius:9px;font-size:15px;background:#fff;outline:none\" style-focus=\"border-color:#1C6CA8\">\n              <\u002Fdiv>\n            <\u002Fdiv>\n\n            <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:14px;margin-bottom:14px\">\n              <div>\n                <label style=\"display:block;font-size:13.5px;font-weight:600;color:#2C2E33;margin-bottom:6px\">Lokalita<\u002Flabel>\n                <input type=\"text\" value=\"{{ fLokalita }}\" onchange=\"{{ setLokalita }}\" placeholder=\"obec / město\" style=\"width:100%;padding:12px 14px;border:1px solid #DDD9D1;border-radius:9px;font-size:15px;background:#fff;outline:none\" style-focus=\"border-color:#1C6CA8\">\n              <\u002Fdiv>\n              <div>\n                <label style=\"display:block;font-size:13.5px;font-weight:600;color:#2C2E33;margin-bottom:6px\">Termín<\u002Flabel>\n                <input type=\"text\" value=\"{{ fTermin }}\" onchange=\"{{ setTermin }}\" placeholder=\"např. červenec\" style=\"width:100%;padding:12px 14px;border:1px solid #DDD9D1;border-radius:9px;font-size:15px;background:#fff;outline:none\" style-focus=\"border-color:#1C6CA8\">\n              <\u002Fdiv>\n            <\u002Fdiv>\n\n            <div style=\"margin-bottom:20px\">\n              <label style=\"display:block;font-size:13.5px;font-weight:600;color:#2C2E33;margin-bottom:6px\">Zpráva<\u002Flabel>\n              <textarea value=\"{{ fZprava }}\" onchange=\"{{ setZprava }}\" rows=\"3\" placeholder=\"Krátce popište zakázku, ideálně přiložte výkres e-mailem.\" style=\"width:100%;padding:12px 14px;border:1px solid #DDD9D1;border-radius:9px;font-size:15px;background:#fff;outline:none;resize:vertical;font-family:inherit\" style-focus=\"border-color:#1C6CA8\"><\u002Ftextarea>\n            <\u002Fdiv>\n\n            <button type=\"submit\" style=\"width:100%;background:#1C6CA8;color:#fff;border:none;padding:16px;border-radius:11px;font-weight:700;font-size:17px;cursor:pointer;transition:background .15s\" style-hover=\"background:#14517E\">Odeslat poptávku<\u002Fbutton>\n            <p style=\"font-size:12px;color:#9A968D;margin:14px 0 0;line-height:1.5;text-align:center\">Odesláním souhlasíte se zpracováním údajů za účelem vyřízení poptávky. <span style=\"font-family:'Space Mono',monospace\">[napojení: m 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.13.96.36 1.9.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.91.34 1.85.57 2.81.7A2 2 0 0 1 22 16.92z\"><\u002Fpath><\u002Fsvg>Volat<\u002Fa>\n    <a href=\"#kontakt\" style=\"flex:1.4;display:flex;align-items:center;justify-content:center;background:#1C6CA8;color:#fff;text-decoration:none;padding:14px;border-radius:10px;font-weight:700;font-size:16px\">Poptávka<\u002Fa>\n  <\u002Fdiv>\n<\u002Fsc-if>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1280,&quot;height&quot;:900},&quot;showStickyBar&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;},&quot;freeKm&quot;:{&quot;editor&quot;:&quot;int&quot;,&quot;default&quot;:50,&quot;min&quot;:0,&quot;max&quot;:120,&quot;tsType&quot;:&quot;number&quot;},&quot;montazSazba&quot;:{&quot;editor&quot;:&quot;int&quot;,&quot;default&quot;:360,&quot;min&quot;:0,&quot;max&quot;:800,&quot;tsType&quot;:&quot;number&quot;}}\">\nclass Component extends DCLogic {\n  state = {\n    isMobile: false,\n    menuOpen: false,\n    plocha: 80,\n    dny: 7,\n    km: 25,\n    tamZpet: true,\n    montaz: false,\n    f: { jmeno:'', telefon:'', email:'', typ:'', plocha:'', lokalita:'', termin:'', zprava:'' },\n    errors: {},\n    submitted: false,\n    mailtoHref: 'mailto:info@example.cz'\n  };\n\n  componentDidMount() {\n    document.title = '[NÁZEV FIRMY] — Půjčovna stropního bednění a monolitické stropy | Sever Čech';\n    this.setMeta('description', 'Půjčovna stropního bednění a realizace monolitických železobetonových stropů na klíč na severu Čech (Ústecký kraj). Doprava do 50 km zdarma, kladecí plán zdarma, ceny předem.');\n    this.mq = window.matchMedia('(max-width: 860px)');\n    this.onMq = (e) => this.setState({ isMobile: e.matches, menuOpen: false });\n    this.onMq(this.mq);\n    this.mq.addEventListener('change', this.onMq);\n    this._spyT = setTimeout(() => this.setupSpy(), 350);\n  }\n  componentWillUnmount() {\n    if (this.mq) this.mq.removeEventListener('change', this.onMq);\n    if (this.obs) this.obs.disconnect();\n    if (this._spyT) clearTimeout(this._spyT);\n  }\n\n  setMeta(name, content) {\n    let m = document.querySelector('meta[name=\"' + name + '\"]');\n    if (!m) { m = document.createElement('meta'); m.name = name; document.head.appendChild(m); }\n    m.content = content;\n  }\n\n  setupSpy() {\n    const ids = ['pujcovna','realizace','cenik','jak-to-funguje','reference','kontakt'];\n    const secs = ids.map(id => document.getElementById(id)).filter(Boolean);\n    if (!secs.length) return;\n    this.obs = new IntersectionObserver((entries) => {\n      entries.forEach(en => { if (en.isIntersecting) this.highlight(en.target.id); });\n    }, { rootMargin: '-45% 0px -50% 0px', threshold: 0 });\n    secs.forEach(s => this.obs.observe(s));\n  }\n  highlight(id) {\n    document.querySelectorAll('[data-nav]').forEach(a => {\n      a.style.color = (a.getAttribute('data-nav') === id) ? '#1C6CA8' : '';\n    });\n  }\n\n  toggleMenu = () => this.setState(s => ({ menuOpen: !s.menuOpen }));\n  closeMenu = () => this.setState({ menuOpen: false });\n\n  setPlocha = (e) => this.setState({ plocha: +e.target.value });\n  setDny = (e) => this.setState({ dny: +e.target.value });\n  setKm = (e) => this.setState({ km: +e.target.value });\n  toggleTamZpet = () => this.setState(s => ({ tamZpet: !s.tamZpet }));\n  toggleMontaz = () => this.setState(s => ({ montaz: !s.montaz }));\n\n  field = (key) => (e) => {\n    const v = e.target.value;\n    this.setState(s => ({ f: Object.assign({}, s.f, { [key]: v }) }));\n  };\n\n  onSubmit = (e) => {\n    e.preventDefault();\n    const f = this.state.f;\n    const errors = {};\n    if (!f.jmeno.trim()) errors.jmeno = 'Vyplňte prosím jméno.';\n    if (!f.telefon.trim()) errors.telefon = 'Vyplňte prosím telefon.';\n    else if (f.telefon.replace(/[^0-9]/g, '').length < 9) errors.telefon = 'Zkontrolujte telefonní číslo.';\n    if (f.email.trim() && !/^[^@\\s]+@[^@\\s]+\\.[^@\\s]+$/.test(f.email.trim())) errors.email = 'Zkontrolujte e-mail.';\n    if (!f.typ) errors.typ = 'Vyberte prosím typ poptávky.';\n    if (Object.keys(errors).length) { this.setState({ errors }); return; }\n\n    const body =\n      'Jméno: ' + f.jmeno + '\\n' +\n      'Telefon: ' + f.telefon + '\\n' +\n      'E-mail: ' + f.email + '\\n' +\n      'Typ: ' + f.typ + '\\n' +\n      'Plocha stropu: ' + f.plocha + ' m²\\n' +\n      'Lokalita: ' + f.lokalita + '\\n' +\n      'Termín: ' + f.termin + '\\n\\n' +\n      f.zprava;\n    const mailtoHref = 'mailto:info@example.cz?subject=' +\n      encodeURIComponent('Poptávka z webu — ' + (f.typ || 'bednění')) +\n      '&body=' + encodeURIComponent(body);\n\n    // Pro napojení na Web3Forms/Formspree: sem doplňte fetch na endpoint, např.\n    // fetch('https://api.web3forms.com/submit', { method:'POST', body: ... })\n    this.setState({ errors: {}, submitted: true, mailtoHref });\n  };\n\n  resetForm = () => this.setState({\n    submitted: false, errors: {},\n    f: { jmeno:'', telefon:'', email:'', typ:'', plocha:'', lokalita:'', termin:'', zprava:'' }\n  });\n\n  renderVals() {\n    const { plocha, dny, km, tamZpet, montaz, f, errors, submitted, isMobile } = this.state;\n    const freeKm = this.props.freeKm ?? 50;\n    const montazSazba = this.props.montazSazba ?? 360;\n    const showStickyBar = this.props.showStickyBar ?? true;\n\n    const sazba = dny <= 5 ? 14 : dny <= 20 ? 11 : 8;\n    const bandLabel = dny <= 5 ? '1–5 dní' : dny <= 20 ? '6–20 dní' : '20+ dní';\n    const pronajem = plocha * sazba * dny;\n    const doprava = (km <= freeKm ? 0 : km * 30) * (tamZpet ? 2 : 1);\n    const montazCena = montaz ? plocha * montazSazba : 0;\n    const mezisoucet = Math.max(pronajem + doprava + montazCena, 1500);\n    const dph = mezisoucet * 0.21;\n    const celkem = mezisoucet + dph;\n\n    const kc = (n) => new Intl.NumberFormat('cs-CZ', { maximumFractionDigits: 0 }).format(Math.round(n)) + ' Kč';\n    const num = (n) => new Intl.NumberFormat('cs-CZ', { maximumFractionDigits: 0 }).format(Math.round(n));\n\n    return {\n      isMobile,\n      isDesktop: !isMobile,\n      menuOpen: this.state.menuOpen,\n      stickyBar: isMobile && showStickyBar,\n      toggleMenu: this.toggleMenu,\n      closeMenu: this.closeMenu,\n\n      plocha, dny, km,\n      setPlocha: this.setPlocha, setDny: this.setDny, setKm: this.setKm,\n      toggleTamZpet: this.toggleTamZpet, toggleMontaz: this.toggleMontaz,\n      tzTrack: tamZpet ? '#1C6CA8' : '#3A3F45', tzKnob: tamZpet ? 'translateX(21px)' : 'none',\n      mzTrack: montaz ? '#1C6CA8' : '#3A3F45', mzKnob: montaz ? 'translateX(21px)' : 'none',\n\n      sazba, bandLabel,\n      pronajemStr: kc(pronajem),\n      dopravaStr: kc(doprava),\n      dopravaNote: doprava === 0 ? '(do ' + freeKm + ' km zdarma)' : (tamZpet ? '(tam i zpět)' : '(jednosměr)'),\n      montazStr: kc(montazCena),\n      mezisoucetStr: kc(mezisoucet),\n      dphStr: kc(dph),\n      celkemStr: kc(celkem),\n      stojkyStr: num(plocha * 0.7),\n      trojnozkyStr: num(plocha * 0.3),\n      nosnikyStr: num(plocha * 2.7),\n      deskyStr: num(plocha * 1.1),\n\n      submitted,\n      notSubmitted: !submitted,\n      mailtoHref: this.state.mailtoHref,\n      onSubmit: this.onSubmit,\n      resetForm: this.resetForm,\n      fJmeno: f.jmeno, fTelefon: f.telefon, fEmail: f.email, fTyp: f.typ,\n      fPlocha: f.plocha, fLokalita: f.lokalita, fTermin: f.termin, fZprava: f.zprava,\n      setJmeno: this.field('jmeno'), setTelefon: this.field('telefon'), setEmail: this.field('email'),\n      setTyp: this.field('typ'), setPlochaF: this.field('plocha'), setLokalita: this.field('lokalita'),\n      setTermin: this.field('termin'), setZprava: this.field('zprava'),\n      errJmeno: errors.jmeno || '', errTelefon: errors.telefon || '', errEmail: errors.email || '', errTyp: errors.typ || ''\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
